# NEVER add features or feature flags to this Cargo.toml!
# SwissArmyHammer provides ALL functionality ALL the time.
# This is a SwissArmyHammer - every tool, every time!

[package]
name = "swissarmyhammer-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Command-line interface for SwissArmyHammer prompt management"
default-run = "sah"

[package.metadata.dist]
dist = false

[lib]
name = "swissarmyhammer_cli"
path = "src/lib.rs"

[[bin]]
name = "sah"
path = "src/main.rs"

[[bin]]
name = "sah-generate-docs"
path = "src/generate_docs.rs"

[dependencies]
# Library dependencies
swissarmyhammer = { path = "../swissarmyhammer" }
swissarmyhammer-doctor = { path = "../swissarmyhammer-doctor" }
swissarmyhammer-tools = { path = "../swissarmyhammer-tools" }
swissarmyhammer-code-context = { path = "../swissarmyhammer-code-context" }
swissarmyhammer-lsp = { path = "../swissarmyhammer-lsp" }
swissarmyhammer-project-detection = { path = "../swissarmyhammer-project-detection" }
swissarmyhammer-config = { path = "../swissarmyhammer-config" }
swissarmyhammer-common = { path = "../swissarmyhammer-common" }
swissarmyhammer-git = { path = "../swissarmyhammer-git" }
swissarmyhammer-operations = { path = "../swissarmyhammer-operations" }
swissarmyhammer-skills = { path = "../swissarmyhammer-skills" }
swissarmyhammer-agent = { path = "../swissarmyhammer-agent" }
swissarmyhammer-agents = { path = "../swissarmyhammer-agents" }
swissarmyhammer-statusline = { path = "../swissarmyhammer-statusline" }
avp-common = { path = "../avp-common" }
swissarmyhammer-prompts = { path = "../swissarmyhammer-prompts" }
mirdan = { path = "../mirdan" }
swissarmyhammer-templating = { path = "../swissarmyhammer-templating" }

llama-agent = { workspace = true }

# CLI dependencies
clap = { workspace = true }
clap_complete = { workspace = true }
colored = { workspace = true }
is-terminal = { workspace = true }
dirs = { workspace = true }
dialoguer = { workspace = true }
atty = { workspace = true }

[target.'cfg(any(target_os = "macos", target_os = "windows"))'.dependencies]
arboard = { workspace = true }
comfy-table = { workspace = true }

# Async runtime
tokio = { workspace = true }
futures-util = { workspace = true }

# Serialization
serde = { workspace = true }
serde_yaml_ng = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# MCP support
rmcp = { workspace = true }

# Timestamps
chrono = { workspace = true }

# File operations
walkdir = { workspace = true }
tempfile = { workspace = true }
glob = { workspace = true }
ignore = { workspace = true }

# Utils
regex = { workspace = true }
once_cell = { workspace = true }
libc = { workspace = true }
derive_builder = { workspace = true }
scopeguard = { workspace = true }
sha2 = { workspace = true }
which = { workspace = true }

# Git integration
git2 = { workspace = true }
owo-colors = { workspace = true }
reqwest.workspace = true

# Documentation generation (used by sah-generate-docs binary)
clap-markdown = { workspace = true }
clap_mangen = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
predicates = { workspace = true }
tempfile = { workspace = true }
serial_test = { workspace = true }
reqwest = { workspace = true }

nix = { workspace = true }
