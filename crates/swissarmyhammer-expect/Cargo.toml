[package]
name = "swissarmyhammer-expect"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "The expect engine: pure domain model for human-authored behavioral expectations, observations, and verdicts"

[dependencies]
# Serialization — the whole domain model is serde-driven (golden/received JSON wire forms)
serde = { workspace = true }
serde_json = { workspace = true }

# YAML frontmatter parsing for *.expect.md spec files
serde_yaml_ng = { workspace = true }

# TOML parsing for .expect/config.toml repo-level config
toml = { workspace = true }

# Locate the repo root (and thus .expect/) from a working directory
swissarmyhammer-directory = { workspace = true }

# Shared skip-directory set for repo-wide *.expect.md discovery
swissarmyhammer-project-detection = { workspace = true }

# Recursive directory traversal for discovering *.expect.md specs
walkdir = { workspace = true }

# Shell-style glob scope resolution
glob = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Locator dialect: regex stream-capture and number extraction for the assertion compiler
regex = { workspace = true }

# ACP delegation seam (the `drive` module). The engine is agent-construction-free:
# it receives a `DynConnectTo<Client>` + notifier and reuses review's machinery.
agent-client-protocol = { workspace = true }
agent-client-protocol-extras = { workspace = true }
claude-agent = { workspace = true }
tokio = { workspace = true }

# Structured logging for the drive seam (stderr is swallowed under MCP).
tracing = { workspace = true }

# Reuse review's `AgentPool` (submit/fork/prime/liveness) and the tolerant
# `extract_json_value` extractor rather than re-deriving the ACP wiring.
swissarmyhammer-validators = { workspace = true }

# Unix process-group signalling so a timed-out cli run kills its descendants too
[target.'cfg(unix)'.dependencies]
nix = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

# Temp dirs for config load / repo-root discovery tests
tempfile = { workspace = true }

# A stub ACP agent for the drive seam's end-to-end test, mirroring review's tests.
# (`tokio` is already a non-dev dependency with the workspace `full` feature set,
# so `#[tokio::test]` and `tokio::time::timeout` are available here too.)
acp-conformance = { workspace = true, features = ["test-support"] }
futures = { workspace = true }
