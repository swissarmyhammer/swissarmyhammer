[package]
name = "swissarmyhammer-expect"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "The expect engine: pure domain model for human-authored behavioral expectations, observations, and verdicts"

[dependencies]
# Serialization — the whole domain model is serde-driven (golden/received JSON wire forms)
serde = { workspace = true }
serde_json = { workspace = true }

# YAML frontmatter parsing for *.expect.md spec files
serde_yaml_ng = { workspace = true }

# TOML parsing for .expect/config.toml repo-level config
toml = { workspace = true }

# Locate the repo root (and thus .expect/) from a working directory
swissarmyhammer-directory = { workspace = true }

# Shared skip-directory set for repo-wide *.expect.md discovery
swissarmyhammer-project-detection = { workspace = true }

# Recursive directory traversal for discovering *.expect.md specs
walkdir = { workspace = true }

# Shell-style glob scope resolution
glob = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Locator dialect: regex stream-capture and number extraction for the assertion compiler
regex = { workspace = true }

# The db surface adapter's in-process Rust client: provision a fresh SQLite
# database, run statements, snapshot it. `bundled` ships SQLite itself so there
# is no external server (matching the no-Node/no-Python stack). The SQL-projection
# locator also reloads a captured snapshot into an in-memory database to resolve.
rusqlite = { workspace = true }

# Scratch directories owned by the db (temp-file backing) and file (scratch root)
# surface adapters: provision creates one, teardown drops it.
tempfile = { workspace = true }

# The http surface adapter's in-process Rust client: issue the request, read
# status/headers/body. `blocking` is added on top of the workspace features so the
# adapter stays synchronous like the `SurfaceAdapter` trait (it runs under
# `spawn_blocking` in production), with no Node/Python harness.
reqwest = { workspace = true, features = ["blocking"] }

# Stable content hashing for the golden's stale-detection spec hash (mirrors the
# review tracker's sha256 content fingerprint).
sha2 = { workspace = true }

# ACP delegation seam (the `drive` module). The engine is agent-construction-free:
# it receives a `DynConnectTo<Client>` + notifier and reuses review's machinery.
agent-client-protocol = { workspace = true }
agent-client-protocol-extras = { workspace = true }
claude-agent = { workspace = true }
tokio = { workspace = true }
# `CancellationToken` is the pool cancel handle `AcpGoalDriver` fires when the
# spec wall-clock timeout elapses, so `drive_and_revalidate` actively cancels the
# in-flight ACP session (reusing the pool's idle/ceiling cancel) instead of
# orphaning the agent by dropping the drive future.
tokio-util = { workspace = true }

# Structured logging for the drive seam (stderr is swallowed under MCP).
tracing = { workspace = true }

# Reuse review's `AgentPool` (submit/fork/prime/liveness) and the tolerant
# `extract_json_value` extractor rather than re-deriving the ACP wiring.
swissarmyhammer-validators = { workspace = true }

# The browser surface adapter's in-process CDP client: launch/attach Chromium and
# drive (CDP `Input`) / observe (CDP `Accessibility`) it through the DevTools
# Protocol — pure Rust, no Node/Playwright. Runs on the existing tokio runtime.
chromiumoxide = { workspace = true }

# Drives the chromiumoxide CDP event `Handler` stream (a `futures::Stream`) while
# commands are issued on the browser surface.
futures = { workspace = true }

# Unix process-group signalling so a timed-out cli run kills its descendants too
[target.'cfg(unix)'.dependencies]
nix = { workspace = true }

# The gui surface adapter's macOS accessibility (AX) backend: drive native/Tauri
# apps via AXUIElementPerformAction/AXPress and snapshot the AX subtree — pure
# Rust over the OS AX API, no CDP/Node. `accessibility` is the safe AXUIElement
# wrapper, `accessibility-sys` provides AXIsProcessTrusted + kAXPressAction, and
# `core-foundation` carries the CFString/CFType values the AX API returns. All
# macOS-only; the Windows/Linux backends are a separate follow-on task.
[target.'cfg(target_os = "macos")'.dependencies]
accessibility = { workspace = true }
accessibility-sys = { workspace = true }
core-foundation = { workspace = true }

# The gui surface adapter's Windows accessibility (UIA) backend: drive native/Tauri
# apps via IUIAutomation `InvokePattern`/`ValuePattern` and snapshot the UIA tree.
# Windows-only (a `cfg(target_os = "windows")` target dependency) so the macOS and
# Linux builds never pull it.
[target.'cfg(target_os = "windows")'.dependencies]
uiautomation = { workspace = true }

# The gui surface adapter's Linux accessibility (AT-SPI) backend: drive and observe
# native/Tauri (WebKitGTK-bridged) apps by role+name over D-Bus. `atspi` re-exports
# the zbus types the backend builds Action/EditableText proxies with, and runs on a
# tokio runtime (the `tokio` dependency above, already present for the drive seam).
# Linux-only (a `cfg(target_os = "linux")` target dependency) so the macOS and
# Windows builds never pull it.
[target.'cfg(target_os = "linux")'.dependencies]
atspi = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

# (`tempfile` is a normal dependency — the db/file adapters own scratch dirs at
# runtime — so it is available to tests without re-declaring it here.)

# A stub ACP agent for the drive seam's end-to-end test, mirroring review's tests.
# (`tokio` is already a non-dev dependency with the workspace `full` feature set,
# so `#[tokio::test]` and `tokio::time::timeout` are available here too.)
acp-conformance = { workspace = true, features = ["test-support"] }
# (`futures` is a normal dependency — the browser adapter drives the CDP handler
# stream at runtime — so it is available to tests without re-declaring it here.)

# A tiny in-process axum fixture HTTP server for the http surface adapter's
# integration tests (bound to 127.0.0.1:0). `tokio` (above) drives it.
axum = { workspace = true }
