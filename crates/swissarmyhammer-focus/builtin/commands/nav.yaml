# Universal spatial-navigation commands contributed by the
# `swissarmyhammer-focus` crate.
#
# These nine `nav.*` ids are the user-facing surface of the focus
# kernel's navigation ops (`spatial_navigate`, `spatial_drill_in`,
# `spatial_drill_out`) plus the `nav.jump` (AceJump-style scope
# picker) overlay. The kernel is generic / domain-free, so the YAML
# stubs ship with the focus crate rather than the kanban crate.
#
# Execution lives in React closures in
# `kanban-app/ui/src/components/app-shell.tsx` (`buildNavCommands`,
# `buildDrillCommands`) — they need live `SpatialFocusActions` from the
# `SpatialFocusProvider`. The YAML carries metadata only: id, name,
# keys, and menu placement. The frontend's command merging logic
# combines YAML-defined and React-defined commands by id.
#
# Bindings copied from:
# - `app-shell.tsx::NAV_COMMAND_SPEC` for the directional + first/last
#   entries.
# - `kanban-app/ui/src/lib/keybindings.ts::BINDING_TABLES` for
#   `nav.drillIn` / `nav.drillOut` (Enter / Escape in all three modes).

- id: nav.up
  name: Navigate Up
  undoable: false
  keys:
    vim: k
    cua: ArrowUp
    emacs: Ctrl+p
  menu:
    path: [Navigation]
    group: 0
    order: 0

- id: nav.down
  name: Navigate Down
  undoable: false
  keys:
    vim: j
    cua: ArrowDown
    emacs: Ctrl+n
  menu:
    path: [Navigation]
    group: 0
    order: 1

- id: nav.left
  name: Navigate Left
  undoable: false
  keys:
    vim: h
    cua: ArrowLeft
    emacs: Ctrl+b
  menu:
    path: [Navigation]
    group: 0
    order: 2

- id: nav.right
  name: Navigate Right
  undoable: false
  keys:
    vim: l
    cua: ArrowRight
    emacs: Ctrl+f
  menu:
    path: [Navigation]
    group: 0
    order: 3

- id: nav.first
  name: Navigate to First
  undoable: false
  keys:
    cua: Home
    emacs: Alt+<
  menu:
    path: [Navigation]
    group: 1
    order: 0

- id: nav.last
  name: Navigate to Last
  undoable: false
  keys:
    vim: Shift+G
    cua: End
    emacs: Alt+>
  menu:
    path: [Navigation]
    group: 1
    order: 1

- id: nav.drillIn
  name: Drill In
  undoable: false
  keys:
    vim: Enter
    cua: Enter
    emacs: Enter
  menu:
    path: [Navigation]
    group: 2
    order: 0

- id: nav.drillOut
  name: Drill Out
  undoable: false
  keys:
    vim: Escape
    cua: Escape
    emacs: Escape
  menu:
    path: [Navigation]
    group: 2
    order: 1

- id: nav.jump
  name: Jump To
  undoable: false
  keys:
    vim: s
    cua: Mod+G
    emacs: Mod+G
  menu:
    path: [Navigation]
    group: 3
    order: 0
