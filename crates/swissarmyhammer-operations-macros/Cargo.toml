[package]
name = "swissarmyhammer-operations-macros"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Procedural macros for swissarmyhammer operations"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full", "extra-traits"] }

# Dev-only: the macro emits code that references these runtime crates by path.
# The proc-macro crate itself never links them — they exist solely so the
# `tests/` integration target can invoke `operation_tool!` and inspect the
# `rmcp::model::Tool` it produces.
[dev-dependencies]
rmcp = { workspace = true }
serde_json = { workspace = true }
swissarmyhammer-operations = { workspace = true }
