[package]
name = "mirdan"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Mirdan - Universal package manager for AI coding agents (core library)"

[lib]
name = "mirdan"
path = "src/lib.rs"

[features]
# Exposes `mirdan::test_support` — public helpers for driving the profile
# installer in a hermetic environment. Enabled as a dev-dependency feature by
# the app CLIs whose registry tests drive the real `profile(scope)`.
test-support = []

[dependencies]
# Shared doctor infrastructure
swissarmyhammer-doctor = { workspace = true }

# Git detection
swissarmyhammer-common = { workspace = true }

# XDG directory helpers
swissarmyhammer-directory = { workspace = true }

# Builtin skill resolution + content formatting, and Liquid template rendering
swissarmyhammer-skills = { workspace = true }
swissarmyhammer-templating = { workspace = true }

# Builtin agent resolution + AGENT.md serialization, Liquid+partial rendering,
# and the template context type — the profile installer resolves, renders, and
# deploys builtin skills and agents through these.
swissarmyhammer-agents = { workspace = true }
swissarmyhammer-prompts = { workspace = true }
swissarmyhammer-config = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml_ng = { workspace = true }
toml = { workspace = true }

# CLI
clap = { workspace = true }
clap_complete = { workspace = true }
swissarmyhammer-cli-completions = { workspace = true }

# Terminal interaction
crossterm = { workspace = true }

# Table display
comfy-table = { workspace = true }

# Async runtime
tokio = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# File system
dirs = { workspace = true }
walkdir = { workspace = true }

# Authentication
axum = { workspace = true }
reqwest = { workspace = true }
urlencoding = { workspace = true }
rand = { workspace = true }

# Package management
zip = { workspace = true }
sha2 = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
futures-util = { workspace = true }
indicatif = { workspace = true }
dialoguer = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
which = { workspace = true }
tempfile = { workspace = true }
pathdiff = { workspace = true }
git2 = { workspace = true, features = ["https", "vendored-openssl"] }
url = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
serial_test = { workspace = true }
# Enable the crate's own `test-support` helpers for its in-crate tests so the
# installer test modules reuse the single public scaffolding (config writer,
# error/deploy asserters) instead of maintaining drifting private copies.
mirdan = { path = ".", features = ["test-support"] }
