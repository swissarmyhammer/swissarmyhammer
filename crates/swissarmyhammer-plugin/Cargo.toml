[package]
name = "swissarmyhammer-plugin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Plugin platform for SwissArmyHammer: registers MCP servers and dispatches operations to them"

[dependencies]
# JS runtime used to host plugin code
deno_core = { workspace = true }
deno_ast = { workspace = true }

# MCP server/client protocol
rmcp = { workspace = true }

# HTTP header types for the UrlServer transport's custom headers
http = { workspace = true }

# Async runtime and utilities
tokio = { workspace = true }
async-trait = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling and diagnostics
thiserror = { workspace = true }
tracing = { workspace = true }

# Directory stacking for plugin discovery
swissarmyhammer-directory = { workspace = true }

[dev-dependencies]
# Used by the cli_server integration test to probe whether a spawned
# subprocess is still alive via kill(2) with signal 0.
libc = { workspace = true }

# Used by the url_server integration test to stand up a real HTTP MCP
# endpoint: `axum` mounts the rmcp `StreamableHttpService` on a loopback
# port. The `http` types the test also needs come in through the crate's
# own dependency on `http`.
axum = { workspace = true }

[lints]
workspace = true

# A minimal stdio MCP server used purely as a test fixture for the `CliServer`
# transport. The `cli_server` integration test spawns it as a child process and
# locates it through the `CARGO_BIN_EXE_cli_server_fixture` environment variable
# that Cargo sets for integration tests. It is not part of the platform's
# public surface.
[[bin]]
name = "cli_server_fixture"
path = "src/bin/cli_server_fixture.rs"
