[package]
name = "acp-conformance"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[features]
# Export the `test_utils` mock-agent harness (`MockAgent`, `MockAgentAdapter`,
# `run_with_mock_agent`, …) for downstream crates' tests, so they reuse this
# harness instead of carrying their own copy of the ACP mock-agent wiring.
test-support = ["dep:futures"]

[dependencies]
agent-client-protocol.workspace = true
agent-client-protocol-extras = { workspace = true }
tokio.workspace = true
tokio-stream = { workspace = true, features = ["sync"] }
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
swissarmyhammer-common = { workspace = true }
# Only for the `test-support` harness (BoxFuture in the MockAgent trait).
futures = { workspace = true, optional = true }

[dev-dependencies]
async-trait.workspace = true
tracing-subscriber.workspace = true
tempfile.workspace = true
test-log.workspace = true
llama-agent = { workspace = true }
claude-agent = { workspace = true }
futures.workspace = true
tokio-util = { workspace = true, features = ["compat"] }
piper = { workspace = true }
serial_test.workspace = true
rstest.workspace = true
