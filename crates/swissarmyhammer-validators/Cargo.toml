[package]
name = "swissarmyhammer-validators"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Pluggable review engine: the rules-as-data validator loader and the shared agent pool"

[dependencies]
# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml_ng = { workspace = true }

# Per-reviewed-file context-hash tracking: SHA-256 over path+content+rules so an
# unchanged file is subtracted from the next `review working` pass, and an RFC3339
# `reviewed_at` timestamp on each tracking entry.
sha2 = { workspace = true }
chrono = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Pattern matching
glob = { workspace = true }
regex = { workspace = true }

# gitignore-syntax matching for the review scope's `.reviewignore` + `.gitignore`
# exclusion layer — reuses git's own ignore semantics (`!` negation, directory
# patterns) rather than reimplementing them.
ignore = { workspace = true }

# Logging
tracing = { workspace = true }

# File system traversal
walkdir = { workspace = true }

# Validator directory management and `@`-include expansion
swissarmyhammer-directory = { workspace = true }

# Home-directory resolution for the user validators store (~/.validators),
# resolved the same raw way the shared `mirdan::store` does.
dirs = { workspace = true }

# Templating / partials for the rules-as-data loader
swissarmyhammer-templating = { workspace = true }

# ACP agent connection driven by the shared agent pool
claude-agent = { workspace = true }
agent-client-protocol = { workspace = true }
# TolerantResponseRouter for the review drive's client connection (an abandoned
# turn's late response must fail that turn only, not the dispatch loop); also
# supplies the PlaybackAgent harness the pool tests replay fixtures through.
agent-client-protocol-extras = { workspace = true }

# Scope stage (engine stage 1): the changed-file set + entity-level semantic diff
# are reused from the same library crates the `git` MCP tool is built on. The tool
# itself lives in `swissarmyhammer-tools` and is not library-callable from the
# engine (depending on it would invert the dependency direction), so this is the
# factored shared git-ops call site — git2 via `swissarmyhammer-git` plus the
# tree-sitter differ in `swissarmyhammer-sem` — never a reimplementation or shell-out.
swissarmyhammer-git = { workspace = true }
swissarmyhammer-sem = { workspace = true }

# Engine-run code_context probes: the duplicate/callgraph/search ops reused as a
# library (never reimplemented) and the embedding trait used to bind probe args.
swissarmyhammer-code-context = { workspace = true }
model-embedding = { workspace = true }
# The code_context ops take a `&Connection`; the probe runner's public API mirrors
# that established pattern, so rusqlite is a normal dependency, not just dev.
rusqlite = { workspace = true }

# Async runtime backing the agent pool's worker tasks
tokio = { workspace = true }
# `join_all` drives the per-validator prime→fork fan-out runs concurrently
# (the pool still owns the only real concurrency control)
futures = { workspace = true }

# The scope stage reads blobs via the `swissarmyhammer-git` repo handle's raw
# git2 layer and must distinguish "path absent at this ref" (the Added/Deleted
# signal) from a genuine read failure (a binary/non-UTF8 tracked blob) — that
# discrimination names `git2::ErrorCode`, so git2 is a direct, non-optional dep.
git2 = { workspace = true }

# Optional dep activated only by the `test-support` feature, which exports the
# review test fixtures (`test_support`) to downstream crates' tests — the shared
# scripted ACP agent harness plus the throwaway git repo / seeded code_context
# index fixtures. During this crate's OWN `#[cfg(test)]` runs this is supplied
# by the matching `[dev-dependencies]` below.
tempfile = { workspace = true, optional = true }

[features]
# Export the review `test_support` fixtures (the shared scripted ACP agent
# harness, the throwaway git repo, and the seeded in-memory code_context index)
# to downstream crates' tests, mirroring agent-client-protocol-extras' and
# acp-conformance's `test-support` features. `swissarmyhammer-tools` dev-depends
# on this so its review-tool tests consume the one shared harness rather than
# carrying their own copies.
test-support = ["dep:tempfile", "model-embedding/test-support"]

[build-dependencies]
swissarmyhammer-build = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
serial_test = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tracing-test = { workspace = true }
# The shared ACP mock-agent harness (MockAgent trait + adapter + dispatch) the
# pool tests drive their scripted agents through — reused, never copied.
acp-conformance = { workspace = true, features = ["test-support"] }
# Deterministic embedder for the probe-runner tests (no 600MB model load)
model-embedding = { workspace = true, features = ["test-support"] }
# Real temp git repos for the scope-stage tests (init/commit/working-tree).
git2 = { workspace = true }
