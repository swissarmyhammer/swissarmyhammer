# Build, sign, notarize, and publish the Mirdan tray app and Kanban app (Tauri v2).
#
# This workflow runs alongside the cargo-dist release.yml workflow.
# cargo-dist creates the GitHub Release and publishes the lean CLI binary.
# This workflow builds the Tauri .app / .dmg for each app and uploads them to the same release.

name: Release App

permissions:
  contents: write

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: mirdan
            dir: mirdan-app
            product: Mirdan
          - name: kanban
            dir: kanban-app
            product: Kanban
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Rust toolchain
        run: |
          rustup target add aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tauri CLI
        run: |
          cargo install tauri-cli --version "^2" --locked || true

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          echo "Certificate file size: $(wc -c < /tmp/certificate.p12) bytes"

          # Create and configure build keychain
          security create-keychain -p "" build.keychain-db || true
          security unlock-keychain -p "" build.keychain-db
          security set-keychain-settings -lut 21600 build.keychain-db

          # Add build keychain to search list (keep login keychain too)
          security list-keychains -d user -s build.keychain-db $(security list-keychains -d user | tr -d '"')

          # Install Apple intermediate certificates (needed for chain validation)
          curl -sL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o /tmp/DevIDG2.cer
          security import /tmp/DevIDG2.cer -k build.keychain-db -T /usr/bin/codesign
          curl -sL https://www.apple.com/appleca/AppleIncRootCertificate.cer -o /tmp/AppleRoot.cer
          security import /tmp/AppleRoot.cer -k build.keychain-db -T /usr/bin/codesign

          # Import certificate and private key
          security import /tmp/certificate.p12 -k build.keychain-db -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain-db

          rm /tmp/certificate.p12 /tmp/DevIDG2.cer /tmp/AppleRoot.cer

          echo "=== Codesigning identities ==="
          security find-identity -v -p codesigning
          echo "=== All identities in build keychain ==="
          security find-identity -v build.keychain-db

      - name: Build Tauri app (${{ matrix.app.product }})
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        working-directory: ${{ matrix.app.dir }}
        run: |
          cargo tauri build --target aarch64-apple-darwin

      - name: Find DMG
        id: find-dmg
        working-directory: ${{ matrix.app.dir }}
        run: |
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          echo "dmg_path=$DMG" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename $DMG)" >> "$GITHUB_OUTPUT"
          echo "Found DMG: $DMG"

      - name: Upload DMG to GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Wait for cargo-dist to create the release (it may take a few minutes)
          for i in $(seq 1 30); do
            if gh release view "$TAG" > /dev/null 2>&1; then
              echo "Release $TAG found"
              break
            fi
            echo "Waiting for release $TAG to be created... ($i/30)"
            sleep 10
          done
          # Upload versioned DMG (original filename includes version)
          gh release upload "$TAG" "${{ matrix.app.dir }}/${{ steps.find-dmg.outputs.dmg_path }}" --clobber
          # Upload stable-name DMG for permanent download URLs
          cp "${{ matrix.app.dir }}/${{ steps.find-dmg.outputs.dmg_path }}" "${{ matrix.app.product }}-latest.dmg"
          gh release upload "$TAG" "${{ matrix.app.product }}-latest.dmg" --clobber

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.name }}-app-dmg
          path: ${{ matrix.app.dir }}/${{ steps.find-dmg.outputs.dmg_path }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain-db || true

  publish-homebrew-cask:
    needs: build-macos
    if: ${{ github.ref_type == 'tag' }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: mirdan
            product: Mirdan
            desc: "Universal package manager for AI coding agents"
            homepage: "https://mirdan.ai"
          - name: kanban
            product: Kanban
            desc: "Kanban board for SwissArmyHammer"
            homepage: "https://github.com/swissarmyhammer/swissarmyhammer"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.app.name }}-app-dmg
          path: dmg/

      - name: Compute SHA256
        id: sha
        run: |
          DMG=$(find dmg -name "*.dmg" | head -1)
          SHA=$(shasum -a 256 "$DMG" | cut -d' ' -f1)
          NAME=$(basename "$DMG")
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA for $NAME"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          repository: swissarmyhammer/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        env:
          VERSION: ${{ github.ref_name }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          DMG_NAME: ${{ steps.sha.outputs.dmg_name }}
        run: |
          # Strip leading 'v' from tag for version
          CASK_VERSION="${VERSION#v}"

          mkdir -p homebrew-tap/Casks

          cat > homebrew-tap/Casks/${{ matrix.app.name }}.rb << EOF
          cask "${{ matrix.app.name }}" do
            version "${CASK_VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/swissarmyhammer/swissarmyhammer/releases/download/${VERSION}/${DMG_NAME}"
            name "${{ matrix.app.product }}"
            desc "${{ matrix.app.desc }}"
            homepage "${{ matrix.app.homepage }}"

            app "${{ matrix.app.product }}.app"
          end
          EOF

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' homebrew-tap/Casks/${{ matrix.app.name }}.rb

      - name: Push cask
        working-directory: homebrew-tap
        run: |
          git config user.name "mirdan bot"
          git config user.email "bot@mirdan.ai"
          git add Casks/${{ matrix.app.name }}.rb
          git commit -m "${{ matrix.app.name }} cask ${GITHUB_REF_NAME}"
          git push

  # Placeholder for future Windows build
