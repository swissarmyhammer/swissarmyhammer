# Build, sign, notarize, and publish the Mirdan tray app and Kanban app (Tauri v2).
#
# Triggered automatically after the cargo-dist "Release" workflow completes successfully.
# cargo-dist creates the GitHub Release and publishes the lean CLI binary.
# This workflow builds the Tauri .app / .dmg for each app and uploads them to the same release.
# Can also be triggered manually via workflow_dispatch with a tag input.

name: Release App

permissions:
  contents: write

on:
  # Trigger after the cargo-dist Release workflow creates the GitHub Release
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

# Only one Release App run at a time on the single self-hosted runner. If a new
# release starts while an old run is still grinding (or hung), cancel the old
# one so it stops squatting the runner and leaving orphan cargo/rustc behind.
concurrency:
  group: release-app
  cancel-in-progress: true

jobs:
  build-macos:
    # Skip if workflow_run triggered by a failed/cancelled Release
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: self-hosted
    # Past kanban runs hung for 4-6h with zero output. Root cause (from the
    # logs) is NOT code signing -- the build never reaches it. It thrashes in
    # the *cargo compile* phase: the kanban app's dependency graph (Tauri's
    # wry/webkit GUI stack + the swissarmyhammer-agent/llama.cpp stack, the
    # latter built twice -- once for the CLI sidecar, once for the app) peaks
    # past the runner's RAM and swaps to death. release.yml compiles the same
    # llama stack for the CLI in ~14m, so the fix is to bound peak memory
    # (CARGO_BUILD_JOBS on the build step) rather than touch signing.
    #
    # NOTE: this job-level timeout-minutes does NOT reliably fire on the
    # self-hosted runner (past hangs ran 4-6h despite a 30m cap), so the build
    # step additionally wraps cargo in an OS-level watchdog. This value is just
    # a backstop; it is generous because a healthy app build legitimately takes
    # ~40-70m at reduced parallelism.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        app:
          - name: mirdan
            dir: apps/mirdan-app
            product: Mirdan
          # `cli` is only set on apps that bundle a CLI sidecar. When true,
          # verify-app-bundle.sh is invoked with --require-cli so the release
          # is gated on the bundled `kanban` CLI being present and runnable.
          - name: kanban
            dir: apps/kanban-app
            product: Kanban
            cli: true
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            # workflow_run: the tag is the head_branch of the triggering run
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive
          ref: ${{ steps.tag.outputs.value }}

      - name: Install Rust toolchain
        run: |
          rustup target add aarch64-apple-darwin

      - name: Free the runner (kill stale build processes + stale bundle output)
        # This is a persistent self-hosted runner. Past hung runs were cancelled
        # without their cargo/rustc/cc children being reaped, so they kept
        # running and saturating RAM -- making the next build thrash too (a
        # self-perpetuating doom loop). Reap any stragglers before we start.
        # max-parallel:1 + the concurrency group guarantee no sibling build is
        # legitimately running, so this is safe.
        run: |
          pkill -9 -f 'cargo-tauri|cargo|rustc|llama' 2>/dev/null || true
          sleep 2
          # The matrix legs share this reused workspace and all write to the
          # same bundle output dir. If a prior app's .dmg/.app lingers here, the
          # later "find ... | head -1" steps can pick the WRONG app's artifact
          # (this shipped a kanban cask carrying mirdan's DMG sha256, which made
          # `brew install --cask kanban` fail checksum verification). Wipe the
          # bundle output so each leg only ever sees its own freshly built one.
          rm -rf target/aarch64-apple-darwin/release/bundle
          echo "Free memory before build:"; vm_stat | head -5 || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tauri CLI
        run: |
          cargo install tauri-cli --version "^2" --locked || true

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12

          # Create and configure build keychain
          security create-keychain -p "" ${{ matrix.app.name }}-build.keychain-db || true
          security unlock-keychain -p "" ${{ matrix.app.name }}-build.keychain-db
          security set-keychain-settings -lut 21600 ${{ matrix.app.name }}-build.keychain-db

          # Add build keychain to search list (keep login keychain too)
          security list-keychains -d user -s ${{ matrix.app.name }}-build.keychain-db $(security list-keychains -d user | tr -d '"')

          # Install Apple intermediate certificates (needed for chain validation)
          curl -sL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o /tmp/DevIDG2.cer
          security import /tmp/DevIDG2.cer -k ${{ matrix.app.name }}-build.keychain-db -T /usr/bin/codesign
          curl -sL https://www.apple.com/appleca/AppleIncRootCertificate.cer -o /tmp/AppleRoot.cer
          security import /tmp/AppleRoot.cer -k ${{ matrix.app.name }}-build.keychain-db -T /usr/bin/codesign

          # Import certificate and private key
          security import /tmp/certificate.p12 -k ${{ matrix.app.name }}-build.keychain-db -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" ${{ matrix.app.name }}-build.keychain-db

          rm /tmp/certificate.p12 /tmp/DevIDG2.cer /tmp/AppleRoot.cer

      - name: Build Tauri app (${{ matrix.app.product }})
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Bound peak memory: the kanban app graph (GUI + agent/llama, the
          # llama stack compiled twice) OOM-thrashed the runner at full
          # parallelism and hung for hours. Capping concurrent codegen units
          # keeps the resident set under the runner's RAM. release.yml builds
          # the same stack fine, so this only needs to be conservative, not
          # tiny. Tune up if the runner gets more RAM.
          CARGO_BUILD_JOBS: "4"
        working-directory: ${{ matrix.app.dir }}
        run: |
          # OS-level watchdog: the job-level timeout-minutes does NOT fire on
          # this self-hosted runner (past hangs ran 4-6h under a 30m cap), so a
          # hung build would squat the runner indefinitely. Run the build in the
          # background and hard-kill the whole cargo/rustc tree if it blows past
          # the limit, so the step fails fast and frees the runner.
          # --verbose so the bundle/codesign/notarize phase emits progress.
          WATCHDOG_SECONDS=5400  # 90 minutes
          (
            sleep "$WATCHDOG_SECONDS"
            echo "::error::Tauri build exceeded ${WATCHDOG_SECONDS}s watchdog -- killing cargo/rustc (likely OOM/swap thrash)."
            pkill -9 -f 'cargo-tauri|cargo|rustc|llama' 2>/dev/null || true
          ) &
          watchdog_pid=$!

          set +e
          cargo tauri build --verbose --target aarch64-apple-darwin
          status=$?
          set -e

          # Build finished (or was killed) -- stop the watchdog.
          kill "$watchdog_pid" 2>/dev/null || true
          wait "$watchdog_pid" 2>/dev/null || true
          exit "$status"

      - name: Verify app bundle
        run: |
          # Gate the release on a healthy .app: the bundled `kanban` CLI must
          # be present, executable, and version-reporting (--require-cli), and
          # the bundle must pass codesign verification. A failure here fails
          # the release before the DMG is uploaded.
          #
          # `cargo tauri build` deletes bundle/macos/*.app once the .dmg is
          # built (it logs "Cleaning ...app"), so the .app no longer exists on
          # disk by the time this step runs. Verify it *inside* the freshly
          # built DMG instead -- that is also the exact artifact users install.
          # The DMG is mounted read-only and always detached on exit.
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          [ -n "$DMG" ] || { echo "no .dmg found under bundle/dmg" >&2; exit 1; }
          echo "Verifying app inside DMG: $DMG"

          MOUNT=$(mktemp -d)
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint "$MOUNT"
          trap 'hdiutil detach "$MOUNT" -quiet >/dev/null 2>&1 || hdiutil detach "$MOUNT" -force >/dev/null 2>&1 || true' EXIT

          APP=$(find "$MOUNT" -maxdepth 1 -name "*.app" | head -1)
          echo "Found app bundle: $APP"
          [ -n "$APP" ] || { echo "no .app found inside DMG: $DMG" >&2; exit 1; }

          # --require-cli is only passed for apps that bundle the kanban CLI
          # sidecar; apps without a CLI (e.g. mirdan) omit it.
          VERIFY_ARGS=("$APP")
          if [ "${{ matrix.app.cli }}" = "true" ]; then
            VERIFY_ARGS+=(--require-cli)
          fi

          bash build-support/verify-app-bundle.sh "${VERIFY_ARGS[@]}"

      - name: Find DMG
        id: find-dmg
        run: |
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          echo "dmg_path=$DMG" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename $DMG)" >> "$GITHUB_OUTPUT"
          echo "Found DMG: $DMG"

      - name: Upload DMG to GitHub Release
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          echo "Uploading to release $TAG"
          # Upload with stable architecture-only name for permanent URLs:
          # releases/latest/download/Mirdan_aarch64.dmg
          # releases/latest/download/Kanban_aarch64.dmg
          STABLE_NAME="${{ matrix.app.product }}_aarch64.dmg"
          cp "${{ steps.find-dmg.outputs.dmg_path }}" "$STABLE_NAME"
          gh release upload "$TAG" "$STABLE_NAME" --clobber

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.name }}-app-dmg
          path: ${{ steps.find-dmg.outputs.dmg_path }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain ${{ matrix.app.name }}-build.keychain-db || true

  publish-homebrew-cask:
    needs: build-macos
    # Run even when build-macos partially failed: each app is its own matrix
    # leg here and downloads only its own DMG artifact, so a failed/hung build
    # for one app (e.g. the kanban Tauri build) must not block publishing the
    # cask for an app that built fine (e.g. mirdan). Previously `needs:
    # build-macos` with the default `if` skipped this whole job whenever any
    # build leg failed -- which is why BOTH casks were frozen for months while
    # only kanban was actually broken. Skip only if build-macos never ran.
    if: ${{ always() && needs.build-macos.result != 'skipped' }}
    runs-on: self-hosted
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: mirdan
            product: Mirdan
            desc: "Universal package manager for AI coding agents"
            homepage: "https://mirdan.ai"
          # `cli` is only set on apps that bundle a CLI binary. When true,
          # gen-cask.sh is invoked with --cli-binary so the cask gets a
          # `binary` stanza (CLI on PATH) plus `conflicts_with formula`.
          - name: kanban
            product: Kanban
            desc: "Kanban board for SwissArmyHammer"
            homepage: "https://github.com/swissarmyhammer/swissarmyhammer"
            cli: true
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download DMG artifact
        id: dl
        # The build leg only uploads this artifact on success. If that app's
        # build failed, the download fails -- tolerate it so this leg skips
        # cleanly instead of erroring, while other apps' legs still publish.
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.app.name }}-app-dmg
          # Per-app download dir, NOT a shared `dmg/`. The publish legs run
          # sequentially on the reused self-hosted workspace; a shared dir let a
          # prior leg's DMG linger so `find dmg ... | head -1` hashed the wrong
          # app's file (the kanban cask shipped mirdan's sha256). A unique path
          # per leg guarantees this leg only ever sees its own DMG.
          path: dmg-${{ matrix.app.name }}/

      - name: No DMG -- skipping this app
        if: ${{ steps.dl.outcome != 'success' }}
        run: echo "No DMG artifact for ${{ matrix.app.name }} (build failed or skipped); not publishing its cask."

      - name: Compute SHA256
        id: sha
        if: ${{ steps.dl.outcome == 'success' }}
        run: |
          DMG=$(find "dmg-${{ matrix.app.name }}" -name "*.dmg" | head -1)
          SHA=$(shasum -a 256 "$DMG" | cut -d' ' -f1)
          NAME=$(basename "$DMG")
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA for $NAME"

      - name: Checkout swissarmyhammer
        if: ${{ steps.dl.outcome == 'success' }}
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ steps.tag.outputs.value }}
          path: swissarmyhammer

      - name: Checkout homebrew-tap
        if: ${{ steps.dl.outcome == 'success' }}
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          repository: swissarmyhammer/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        if: ${{ steps.dl.outcome == 'success' }}
        env:
          VERSION: ${{ steps.tag.outputs.value }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          # Strip leading 'v' from tag for the cask version.
          CASK_VERSION="${VERSION#v}"
          STABLE_NAME="${{ matrix.app.product }}_aarch64.dmg"

          mkdir -p homebrew-tap/Casks

          # Build the full argument list in one array. The base args are
          # always present, so the array is never empty -- this stays safe
          # under bash 3.2 (the macOS runner default) where expanding an
          # empty "${arr[@]}" trips `set -u`.
          GEN_ARGS=(
            --name "${{ matrix.app.name }}"
            --product "${{ matrix.app.product }}"
            --version "${CASK_VERSION}"
            --sha256 "${SHA256}"
            --dmg-name "${STABLE_NAME}"
            --desc "${{ matrix.app.desc }}"
            --homepage "${{ matrix.app.homepage }}"
          )

          # The kanban app bundles a `kanban` CLI as a Tauri sidecar at
          # Contents/MacOS/kanban; --cli-binary makes gen-cask.sh add the
          # `binary` and `conflicts_with` stanzas. Apps without a CLI omit it.
          if [ "${{ matrix.app.cli }}" = "true" ]; then
            GEN_ARGS+=(--cli-binary "Contents/MacOS/kanban")
          fi

          bash swissarmyhammer/build-support/gen-cask.sh "${GEN_ARGS[@]}" \
            > homebrew-tap/Casks/${{ matrix.app.name }}.rb

      - name: Push cask
        if: ${{ steps.dl.outcome == 'success' }}
        working-directory: homebrew-tap
        run: |
          git config user.name "mirdan bot"
          git config user.email "bot@mirdan.ai"
          git add Casks/${{ matrix.app.name }}.rb
          git commit -m "${{ matrix.app.name }} cask ${{ steps.tag.outputs.value }}"
          git push

