name: CI

on:
  push:
    branches:
      - "*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  LLAMA_N_GPU_LAYERS: "0"

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install rust-analyzer
        run: rustup component add rust-analyzer
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: cargo install --locked cargo-nextest
      - name: Ensure Chromium is available
        run: |
          if ! command -v chromium &>/dev/null && ! [ -d "/Applications/Chromium.app" ] && ! [ -d "/Applications/Google Chrome.app" ]; then
            brew install --cask chromium --no-quarantine
          fi
      - name: Run tests
        run: cargo nextest run --no-fail-fast

  frontend:
    name: Frontend
    runs-on: self-hosted
    strategy:
      matrix:
        app: [kanban-app, mirdan-app]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        working-directory: ${{ matrix.app }}/ui
        run: npm install
      - name: Typecheck
        working-directory: ${{ matrix.app }}/ui
        run: npx tsc --noEmit
      - name: Test
        working-directory: ${{ matrix.app }}/ui
        run: npm test --if-present

  fmt:
    name: Rustfmt
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Enforce formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Linting
        run: cargo clippy -- -D warnings

  examples:
    name: Run all examples
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build examples
        run: |
          cargo metadata --format-version 1 \
            | jq -r '
                .workspace_members as $members
                | .packages[]
                | select(.id as $id | $members | index($id))
                | .name as $pkg
                | .targets[]
                | select(.kind[] == "example")
                | "\($pkg) \(.name)"
              ' \
            | while read -r pkg name; do
                echo "::group::Running example: $pkg/$name"
                cargo build --example "$name" -p "$pkg"
                echo "::endgroup::"
              done
