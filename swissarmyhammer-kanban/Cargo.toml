[package]
name = "swissarmyhammer-kanban"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Kanban board engine with file-backed storage for task management"

[dependencies]
# Workspace dependencies
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml_ng = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
ulid = { workspace = true }
chrono = { workspace = true }
fs2 = { workspace = true }
async-trait = { workspace = true }
open = "5"

# Local workspace dependencies
swissarmyhammer-common = { workspace = true }
swissarmyhammer-fields = { workspace = true }
swissarmyhammer-entity = { workspace = true }
swissarmyhammer-views = { workspace = true }
swissarmyhammer-perspectives = { workspace = true }
swissarmyhammer-operations = { workspace = true }
swissarmyhammer-commands = { workspace = true }
swissarmyhammer-store = { workspace = true }
swissarmyhammer-filter-expr = { workspace = true }

include_dir = { workspace = true }
fractional_index = "2.0.2"

[dev-dependencies]
tempfile = { workspace = true }
tokio-test = { workspace = true }
# Re-enable the entity crate with test-support so tests and benches can use
# io::READ_ENTITY_DIR_CALLS to assert cache short-circuiting.
swissarmyhammer-entity = { workspace = true, features = ["test-support"] }
criterion = { workspace = true, features = ["async_tokio"] }

[[bench]]
name = "move_task_bench"
harness = false
