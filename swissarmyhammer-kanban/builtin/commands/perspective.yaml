- id: perspective.load
  name: Load Perspective
  params:
    - name: name
      from: args
  keys: {}

- id: perspective.save
  name: Save Perspective
  undoable: true
  params:
    - name: name
      from: args
    - name: view_id
      from: args
  keys: {}

- id: perspective.delete
  name: Delete Perspective
  scope: "entity:perspective"
  undoable: true
  context_menu: true
  params:
    - name: name
      from: args
  keys: {}

- id: perspective.rename
  name: Rename Perspective
  # Hidden from the palette: this command requires `id` + `new_name` args
  # and cannot be invoked directly from the palette (no args prompt UI).
  # The user-facing entry point is `ui.entity.startRename`, which
  # triggers inline rename mode and then dispatches this command with the
  # collected arguments.
  visible: false
  undoable: true
  params:
    - name: id
      from: args
    - name: new_name
      from: args
  keys: {}

- id: perspective.filter.focus
  name: Focus Filter
  # UI-only marker for the Filter tab button. Renders as a `<CommandButton>`
  # in `<RegistryTabButtons>` via `tab_button: { icon: filter }`, and the
  # `isActive` highlight is read from the perspective's `filter` field
  # (see `isCommandActiveForPerspective` in
  # `kanban-app/ui/src/components/perspective-tab-bar.tsx`).
  #
  # The click does NOT route through this command's backend `execute` —
  # `<FilterFocusCommandButton>` (same file) overrides the dispatch and
  # issues `nav.focus({ args: { fq } })` against the formula bar's
  # `filter_editor:${id}` spatial-nav scope. That is the single auditable
  # focus primitive (card `01KR7CDEFWWVF4WH0BCHE8Y21J`); cross-cutting
  # concerns (telemetry, animations, scroll-on-focus) live on `nav.focus`,
  # not on a per-command parallel channel.
  #
  # The backend `FocusFilterCmd` exists as a deliberate no-op solely to
  # satisfy the YAML ↔ Rust completeness invariant
  # (`test_all_yaml_commands_have_rust_implementations` in
  # `swissarmyhammer-kanban/src/commands/mod.rs`). See `FocusFilterCmd`
  # in `swissarmyhammer-kanban/src/commands/perspective_commands.rs` for
  # the rationale and the post-refactor contract.
  #
  # Refactor history: card `01KRGZY33P99J7CGG0XRQGZ352` deleted the prior
  # `FocusFilter` marker-envelope + `ui.focus.filter` Tauri event channel.
  # See `nav.yaml` (where `nav.focus` is declared) and
  # `kanban-app/ui/src/lib/spatial-focus-context.tsx` (where the kernel-
  # facing `nav.focus` execute closure is registered) for the focus
  # primitive itself.
  #
  # No `view_kinds` — filter is meaningful on every view kind.
  # No `context_menu: true` — the right-click already has Clear Filter;
  # "Focus the filter editor" doesn't add value there.
  scope: "entity:perspective"
  tab_button:
    icon: filter
  params:
    - name: perspective_id
      from: scope_chain
      entity_type: perspective
  keys: {}

- id: perspective.filter
  name: Set Filter
  # Palette-only: requires a `filter` expression arg that the bare context
  # menu has no way to collect. Users set filters through the formula bar
  # CM6 editor on the tab bar, not through a right-click → "Set Filter"
  # menu item, so exposing it in the context menu would surface a command
  # that silently fails at dispatch time with `MissingArg("filter")`.
  #
  # `scope: "entity:perspective"` still applies — a palette invocation
  # outside a perspective-bearing scope would also fail, so we hide it
  # from the palette too in that case. `resolve_perspective_id` handles
  # the scope/arg/UIState cascade at execute time.
  scope: "entity:perspective"
  undoable: true
  params:
    - name: filter
      from: args
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.clearFilter
  name: Clear Filter
  scope: "entity:perspective"
  undoable: true
  context_menu: true
  params:
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.group
  name: Group By
  # Tab-button + picker command: the group icon on the active perspective
  # tab renders this command as a `<CommandButton>`; clicking opens a
  # `<CommandPopover>` whose enum-shaped `group` param is populated by
  # the backend `PerspectiveFieldsResolver` (registered in
  # `swissarmyhammer-perspectives`). Picking a field dispatches this
  # command with the picked value plus a scope-chain-resolved
  # `perspective_id`.
  #
  # The `clear_command: perspective.clearGroup` annotation on the `group`
  # param surfaces a "(none)" entry as the first option in the popover;
  # picking it dispatches `perspective.clearGroup` (instead of this
  # command) with the same scope-resolved `perspective_id`. This restores
  # the legacy `<GroupSelector>` "None" affordance without forcing the
  # user to leave the popover and right-click. The Sort migration can
  # reuse the same annotation when it lands.
  #
  # Migrated to command-driven rendering by 01KRE1ZTYJ5PPTQ29K72KE88B5
  # (the second migration of the command-driven-ui epic; pattern
  # established by `perspective.filter.focus`). The `name` was changed
  # from "Set Group" to "Group By" to match the user-facing button
  # label. The dispatcher's `SetGroupCmd::execute` still accepts `group`
  # from any source (args bag → scope chain → UIState → first-for-view-
  # kind), so palette / right-click paths that pre-fill `group` continue
  # to work unchanged.
  scope: "entity:perspective"
  tab_button:
    icon: group
  undoable: true
  params:
    - name: group
      from: args
      shape: enum
      options_from: "perspective.fields"
      clear_command: "perspective.clearGroup"
    - name: perspective_id
      from: scope_chain
      entity_type: perspective
  keys: {}

- id: perspective.clearGroup
  name: Clear Group
  scope: "entity:perspective"
  undoable: true
  context_menu: true
  params:
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.sort.set
  name: Sort Field
  # Palette-only: requires `field` and `direction` args. Sort-set is driven
  # by column-header clicks in the grid view, which dispatch with explicit
  # args; exposing it in the bare right-click menu would silently fail.
  #
  # `view_kinds: [grid]` keeps Sort Field / Clear Sort / Toggle Sort out of
  # palettes and context menus on the board view (where they would have no
  # visible effect — boards organise by column, not by sort order). On grid
  # views sort is the primary ordering mechanism and these stay surfaced.
  scope: "entity:perspective"
  view_kinds: [grid]
  undoable: true
  params:
    - name: field
      from: args
    - name: direction
      from: args
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.sort.clear
  name: Clear Sort
  # Unconditionally clears every sort entry on the resolved perspective.
  # Per-field removal is covered by `perspective.sort.toggle`'s asc → desc →
  # none state cycle; this command is the palette / context-menu entry point
  # for "reset the whole sort list" and never takes a `field` arg.
  #
  # See `perspective.sort.set` above for the `view_kinds: [grid]` rationale.
  scope: "entity:perspective"
  view_kinds: [grid]
  undoable: true
  context_menu: true
  params:
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.sort.toggle
  name: Toggle Sort
  # Palette-only: requires a `field` arg. Toggle is invoked from column
  # headers with the field already known; see `perspective.sort.set` above.
  #
  # See `perspective.sort.set` above for the `view_kinds: [grid]` rationale.
  scope: "entity:perspective"
  view_kinds: [grid]
  undoable: true
  params:
    - name: field
      from: args
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.next
  name: Next Perspective
  params:
    - name: view_kind
      from: args
    - name: view_id
      from: args
  keys:
    cua: "Mod+]"
    vim: "gt"

- id: perspective.prev
  name: Previous Perspective
  params:
    - name: view_kind
      from: args
    - name: view_id
      from: args
  keys:
    cua: "Mod+["
    vim: "gT"

- id: perspective.goto
  name: Go to Perspective
  visible: false
  params:
    - name: id
      from: args
    - name: view_kind
      from: args
    - name: view_id
      from: args
  keys: {}

- id: perspective.list
  name: List Perspectives
  visible: false

- id: perspective.set
  name: Switch Perspective
  # Hidden from the palette: requires a `perspective_id` arg the palette has
  # no generic UI for collecting. User-facing palette entries are emitted
  # by `scope_commands::emit_perspective_goto` — one `perspective.set` row
  # per known perspective with `perspective_id` pre-filled in `args`. The
  # dispatcher takes those rows verbatim; there is no suffix indirection.
  #
  # Before 01KPZMXXEXKVE3RNPA4XJP0105 the palette emitted
  # `perspective.goto:{id}` rows that `match_dynamic_prefix` rewrote back
  # to `perspective.set`; that indirection is gone.
  #
  # Relocated from `ui.perspective.set` in 01KPY02X405QTP5ACH67THHSN8 —
  # "perspective" is a kanban concept (defined in
  # `swissarmyhammer-perspectives`), not a generic UI primitive, so the
  # command lives in the kanban domain alongside every other `perspective.*`
  # entry.
  visible: false
  params:
    - name: perspective_id
      from: args
