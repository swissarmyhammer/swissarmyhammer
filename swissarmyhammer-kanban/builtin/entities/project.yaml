name: project
icon: folder
mention_prefix: "$"
mention_display_field: name
mention_slug_field: id
search_display_field: name
commands:
  - id: ui.inspect
    name: "Inspect {{entity.type}}"
    context_menu: true
  - id: entity.archive
    name: "Archive {{entity.type}}"
    context_menu: true
  - id: project.delete
    name: "Delete {{entity.type}}"
    scope: "entity:project"
    undoable: false
    context_menu: true
    params:
      - name: id
        from: scope_chain
        entity_type: project
  - id: project.add
    name: New Project
    undoable: true
fields:
  - name
  - description
  - color
