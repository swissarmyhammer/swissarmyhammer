name: task
icon: check-square
body_field: body
sections:
  - id: header
    on_card: true
  - id: body
  - id: dates
    label: Dates
  - id: system
    label: System
  - id: footer
search_display_field: title
mention_prefix: "^"
mention_display_field: title
mention_color_field: color
fields:
  - title
  - tags
  - assignees
  - project
  - depends_on
  - body
  - position_column
  - position_ordinal
  - attachments
  - virtual_tags
  - filter_tags
  - due
  - scheduled
  - created
  - updated
  - started
  - completed
  # status_date MUST appear after its depends_on fields — derive_all resolves
  # computed fields in template order and inserts each result back into the
  # fields map, so completed/started/created must already be resolved before
  # status_date reads them. The field's `section: header` still places it
  # in the header group in the inspector.
  - status_date
  # progress is deliberately placed LAST so it renders at the bottom of the
  # header section on both the task card and the inspector (both surfaces
  # iterate this list in order, filtered by `section: header`). This doesn't
  # conflict with derive ordering because progress's only input — `body` —
  # is a stored field that is always present in the fields map before any
  # computed field runs, so progress can sit at any position.
  - progress
