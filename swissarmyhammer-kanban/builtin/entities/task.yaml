name: task
icon: check-square
body_field: body
sections:
  - id: header
    on_card: true
  - id: body
  - id: dates
    label: Dates
    on_card: true
  - id: system
    label: System
  - id: footer
search_display_field: title
mention_prefix: "^"
mention_display_field: title
mention_color_field: color
commands:
  - id: ui.inspect
    name: "Inspect {{entity.type}}"
    context_menu: true
  - id: entity.copy
    name: "Copy {{entity.type}}"
    context_menu: true
    keys:
      cua: Mod+C
      vim: "y"
  - id: entity.cut
    name: "Cut {{entity.type}}"
    context_menu: true
    keys:
      cua: Mod+X
      vim: x
  - id: entity.paste
    name: "Paste {{entity.type}}"
    context_menu: true
    keys:
      cua: Mod+V
      vim: p
  - id: entity.archive
    name: "Archive {{entity.type}}"
    scope: "entity:task"
    undoable: true
    context_menu: true
    keys:
      vim: dd
  - id: entity.unarchive
    name: Unarchive
    scope: "entity:task"
    undoable: true
    context_menu: true
  - id: task.add
    name: New Task
    scope: "entity:column"
    undoable: true
    keys:
      cua: Mod+N
      vim: a
  - id: task.move
    name: Move Task
    scope: "entity:task"
    undoable: true
    visible: false
  - id: task.delete
    name: Delete Task
    scope: "entity:task"
    undoable: true
    context_menu: true
    keys:
      vim: dd
      cua: Mod+Backspace
  - id: task.untag
    name: Remove Tag
    scope: "entity:tag,entity:task"
    undoable: true
    context_menu: true
    keys:
      vim: x
      cua: Delete
  - id: task.doThisNext
    name: Do This Next
    scope: "entity:task"
    undoable: true
    context_menu: true
  - id: attachment.delete
    name: Delete Attachment
    scope: "entity:task"
    undoable: true
    visible: false
fields:
  - title
  - tags
  - assignees
  - project
  - depends_on
  - progress
  - body
  - position_column
  - position_ordinal
  - attachments
  - virtual_tags
  - filter_tags
  - due
  - scheduled
  - created
  - updated
  - started
  - completed
  # status_date MUST appear after its depends_on fields — derive_all resolves
  # computed fields in template order and inserts each result back into the
  # fields map, so completed/started/created must already be resolved before
  # status_date reads them. The field's `section: header` still places it
  # in the header group in the inspector.
  - status_date
