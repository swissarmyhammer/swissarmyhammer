name: tag
icon: tag
mention_prefix: "#"
mention_display_field: tag_name
search_display_field: tag_name
commands:
  - id: entity.inspect
    name: "Inspect {{entity.type}}"
    context_menu: true
  - id: entity.archive
    name: "Archive {{entity.type}}"
    context_menu: true
  - id: entity.copy
    name: Copy Tag
    context_menu: true
    keys:
      cua: Mod+C
      vim: "y"
  - id: entity.cut
    name: Cut Tag
    context_menu: true
    keys:
      cua: Mod+X
      vim: x
fields:
  - tag_name
  - color
  - description
