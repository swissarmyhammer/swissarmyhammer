name: task
icon: check-square
body_field: body
search_display_field: title
mention_prefix: "^"
mention_display_field: title
commands:
  - id: ui.inspect
    name: "Inspect {{entity.type}}"
    context_menu: true
  - id: entity.copy
    name: "Copy {{entity.type}}"
    context_menu: true
    keys:
      cua: Mod+C
      vim: "y"
  - id: entity.cut
    name: "Cut {{entity.type}}"
    context_menu: true
    keys:
      cua: Mod+X
      vim: x
  - id: entity.paste
    name: "Paste {{entity.type}}"
    context_menu: true
    keys:
      cua: Mod+V
      vim: p
  - id: entity.archive
    name: "Archive {{entity.type}}"
    scope: "entity:task"
    undoable: true
    context_menu: true
    keys:
      vim: dd
  - id: entity.unarchive
    name: Unarchive
    scope: "entity:task"
    undoable: true
    context_menu: true
  - id: task.add
    name: New Task
    scope: "entity:column"
    undoable: true
    keys:
      cua: Mod+N
      vim: a
  - id: task.move
    name: Move Task
    scope: "entity:task"
    undoable: true
    visible: false
  - id: task.delete
    name: Delete Task
    scope: "entity:task"
    undoable: true
    context_menu: true
    keys:
      vim: dd
      cua: Mod+Backspace
  - id: task.untag
    name: Remove Tag
    scope: "entity:tag,entity:task"
    undoable: true
    context_menu: true
    keys:
      vim: x
      cua: Delete
  - id: task.doThisNext
    name: Do This Next
    scope: "entity:task"
    undoable: true
    context_menu: true
  - id: attachment.delete
    name: Delete Attachment
    scope: "entity:task"
    undoable: true
    visible: false
fields:
  - title
  - tags
  - assignees
  - depends_on
  - progress
  - body
  - position_column
  - position_swimlane
  - position_ordinal
  - attachments
  - virtual_tags
  - filter_tags
