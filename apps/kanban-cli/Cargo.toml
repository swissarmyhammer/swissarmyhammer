[package]
name = "kanban-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "kanban — a git-native task board for humans and AI coding agents; CLI + MCP server over versionable .kanban/ files"

# No `formula = "..."` override: the Homebrew formula is named after the crate
# (`kanban-cli`). The short `kanban` token belongs to the desktop app cask
# (apps/kanban-app), which bundles this CLI as a sidecar. An override here would
# recreate the formula/cask name collision that made `brew install kanban` pull
# the CLI instead of the app.
[package.metadata.dist]

[[bin]]
name = "kanban"
path = "src/main.rs"

[dependencies]
swissarmyhammer-kanban = { workspace = true }
swissarmyhammer-tools = { workspace = true }
swissarmyhammer-entity = { workspace = true }
swissarmyhammer-merge = { workspace = true }
swissarmyhammer-operations = { workspace = true }
swissarmyhammer-common = { workspace = true }
swissarmyhammer-doctor = { workspace = true }
mirdan = { workspace = true }

rmcp = { workspace = true }
clap = { workspace = true }
clap_complete = { workspace = true }
swissarmyhammer-cli-completions = { workspace = true }
tokio = { workspace = true }
serde_json = { workspace = true }
serde_yaml_ng = { workspace = true }
urlencoding = { workspace = true }
open = "5"
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
is-terminal = { workspace = true }
once_cell = { workspace = true }

[dev-dependencies]
serial_test = { workspace = true }
tempfile = { workspace = true }
swissarmyhammer-cli-completions = { workspace = true, features = ["test-helpers"] }
# Enable mirdan's test-support helpers for the registry deploy tests.
mirdan = { workspace = true, features = ["test-support"] }

[build-dependencies]
clap = { workspace = true }
clap-markdown = { workspace = true }
clap_mangen = { workspace = true }
clap_complete = { workspace = true }
