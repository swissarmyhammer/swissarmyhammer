[package]
name = "avp-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Agent Validator Protocol - Claude Code hook processor CLI"

# No `formula = "..."` override: the formula is named after the crate
# (`avp-cli`), consistent with every other CLI in the workspace.
[package.metadata.dist]

[lib]
name = "avp"
path = "src/lib.rs"

[[bin]]
name = "avp"
path = "src/main.rs"

[dependencies]
# Core library
avp-common = { workspace = true }

# Shared doctor infrastructure
swissarmyhammer-doctor = { workspace = true }

# Serialization
serde_json = { workspace = true }

# CLI
clap = { workspace = true }
clap_complete = { workspace = true }
swissarmyhammer-cli-completions = { workspace = true }

# Async runtime
tokio = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# File system
dirs = { workspace = true }

# Git detection
swissarmyhammer-common = { workspace = true }

# Model management
swissarmyhammer-config = { workspace = true }

# Table output
comfy-table = { workspace = true }

# Colored output
colored = { workspace = true }

[build-dependencies]
clap = { workspace = true }
clap-markdown = { workspace = true }
clap_mangen = { workspace = true }
clap_complete = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
serial_test = { workspace = true }
swissarmyhammer-cli-completions = { workspace = true, features = ["test-helpers"] }
