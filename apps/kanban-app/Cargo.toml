[package]
name = "kanban-app"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Tauri desktop app for SwissArmyHammer Kanban board"

[package.metadata.dist]
dist = false

[[bin]]
name = "kanban-app"
path = "src/main.rs"

[dependencies]
swissarmyhammer-kanban = { workspace = true }
swissarmyhammer-fields = { workspace = true }
swissarmyhammer-ui-state = { workspace = true }
swissarmyhammer-common = { workspace = true }
swissarmyhammer-entity-search = { workspace = true }
swissarmyhammer-entity = { workspace = true }
swissarmyhammer-focus = { workspace = true }
swissarmyhammer-perspectives = { workspace = true }
swissarmyhammer-views = { workspace = true }
swissarmyhammer-store = { workspace = true }
swissarmyhammer-filter-expr = { workspace = true }
swissarmyhammer-directory = { workspace = true }
swissarmyhammer-plugin = { workspace = true }
swissarmyhammer-command-service = { workspace = true }
swissarmyhammer-entity-mcp = { workspace = true }
rmcp = { workspace = true }
swissarmyhammer-window-service = { workspace = true }
swissarmyhammer-app-service = { workspace = true }
swissarmyhammer-tools = { workspace = true }
swissarmyhammer-git = { workspace = true }
include_dir = { workspace = true }
swissarmyhammer-workspace-init = { workspace = true }
tauri = { version = "2", features = ["macos-private-api", "devtools"] }
tauri-plugin-dialog = "2"
tauri-plugin-log = { version = "2", features = ["tracing"] }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
dirs = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-oslog = "0.3"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-global-shortcut = "2"
urlencoding = { workspace = true }
whoami = "1"
base64 = { workspace = true }
ulid = { workspace = true }
swissarmyhammer-agent = { workspace = true }
swissarmyhammer-config = { workspace = true }
agent-client-protocol = { workspace = true }
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }
which = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = [
    "NSAppleScript",
    "NSString",
    "NSAppleEventDescriptor",
    "NSDictionary",
] }

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dev-dependencies]
tempfile = { workspace = true }
swissarmyhammer-entity = { workspace = true, features = ["test-support"] }
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }
serde_json = { workspace = true }
rmcp = { workspace = true }
reqwest = { workspace = true }
