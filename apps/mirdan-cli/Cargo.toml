[package]
name = "mirdan-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Mirdan CLI - Command-line interface for the Mirdan package manager"

[[bin]]
name = "mirdan"
path = "src/main.rs"

# No `formula = "..."` override: the Homebrew formula is named after the crate
# (`mirdan-cli`). The short `mirdan` token belongs to the desktop app cask
# (apps/mirdan-app). An override here would collide the CLI formula with the app
# cask, same bug as kanban.
[package.metadata.dist]

[dependencies]
mirdan = { workspace = true }
clap = { workspace = true }
clap_complete = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[build-dependencies]
clap = { workspace = true }
clap-markdown = { workspace = true }
clap_mangen = { workspace = true }
clap_complete = { workspace = true }

[dev-dependencies]
clap = { workspace = true }
swissarmyhammer-cli-completions = { workspace = true, features = ["test-helpers"] }
