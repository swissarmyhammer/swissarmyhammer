[package]
name = "swissarmyhammer-entity"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Dynamic field-driven entity type with generic I/O"

[dependencies]
serde = { workspace = true }
serde_yaml = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
ulid = { workspace = true }
swissarmyhammer-common = { path = "../swissarmyhammer-common" }
swissarmyhammer-fields = { path = "../swissarmyhammer-fields" }
diffy = { workspace = true }
notify = { workspace = true }
tempfile = { workspace = true, optional = true }

[features]
test-support = ["dep:tempfile"]

[dev-dependencies]
swissarmyhammer-entity = { path = ".", features = ["test-support"] }
tempfile = { workspace = true }
tokio-test = { workspace = true }
