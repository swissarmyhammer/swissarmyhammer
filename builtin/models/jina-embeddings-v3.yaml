---
description: "Jina Embeddings v3: 1024d multilingual embeddings with LoRA"
---
quiet: false
executors:
  # No ANE executor — jina's custom XLM-RoBERTa architecture (flash attention,
  # custom rotary embeddings, einops) is incompatible with CoreML conversion.
  # Uses llama.cpp GGUF on all platforms.
  - executor:
      type: llama-embedding
      config:
        source: !HuggingFace
          repo: "gaianet/jina-embeddings-v3-GGUF"
          filename: "jina-embeddings-v3-Q8_0.gguf"
        normalize: true
        max_sequence_length: 512
