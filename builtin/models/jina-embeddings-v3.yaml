---
description: "Jina Embeddings v3: 1024d multilingual embeddings with LoRA"
---
quiet: false
executors:
  - platform: macos-arm64
    executor:
      type: ane-embedding
      config:
        source: !HuggingFace
          repo: "wballard/jina-embeddings-v3-CoreML"
        normalize: true
        max_sequence_length: 128
  - executor:
      type: llama-embedding
      config:
        source: !HuggingFace
          repo: "gpustack/jina-embeddings-v3-GGUF"
          filename: "jina-embeddings-v3-Q8_0.gguf"
        normalize: true
        max_sequence_length: 512
