---
description: "Nomic Embed Code: 3584d code embedding model (7B, Qwen2-based)"
---
quiet: false
executors:
  # No ANE executor — 7B model is too large for Apple Neural Engine.
  # Uses llama.cpp GGUF on all platforms.
  - executor:
      type: llama-embedding
      config:
        source: !HuggingFace
          repo: "nomic-ai/nomic-embed-code-GGUF"
          filename: "nomic-embed-code-Q8_0.gguf"
        normalize: true
        max_sequence_length: 512
