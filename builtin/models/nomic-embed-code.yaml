---
description: "Nomic Embed Code v2: 768d code embedding model"
---
quiet: false
executors:
  - platform: macos-arm64
    executor:
      type: ane-embedding
      config:
        source: !HuggingFace
          repo: "wballard/nomic-embed-code-v2-CoreML"
        normalize: true
        max_sequence_length: 128
  - executor:
      type: llama-embedding
      config:
        source: !HuggingFace
          repo: "nomic-ai/nomic-embed-code-v2-GGUF"
          filename: "nomic-embed-code-v2-Q8_0.gguf"
        normalize: true
        max_sequence_length: 512
