---
description: "Nomic Embed Code: 3584d code embedding model (7B, Qwen2.5-based)"
---
quiet: false
executors:
  - platform: macos-arm64
    executor:
      type: ane-embedding
      config:
        source: !HuggingFace
          repo: "wballard/nomic-embed-code-CoreML"
        normalize: true
        max_sequence_length: 128
  - executor:
      type: llama-embedding
      config:
        source: !HuggingFace
          repo: "nomic-ai/nomic-embed-code-GGUF"
          filename: "nomic-embed-code.Q8_0.gguf"
        normalize: true
        max_sequence_length: 512
