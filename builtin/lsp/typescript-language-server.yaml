# TypeScript/JavaScript LSP Server Configuration
name: typescript-language-server
project_types:
  - nodejs
command: typescript-language-server
args:
  - --stdio
language_ids:
  - typescript
  - javascript
file_extensions:
  - ts
  - js
  - tsx
  - jsx
initialization_options: null
startup_timeout_secs: 30
health_check_interval_secs: 60
install_hint: "Install typescript-language-server: npm install -g typescript-language-server typescript"

# Doctor checks for this LSP
doctor:
  enabled: true
  description: "Validates typescript-language-server installation and availability"
  check_installed: true
  check_version: false
  expected_output_pattern: null
