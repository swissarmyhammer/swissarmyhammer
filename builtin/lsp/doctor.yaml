# Doctor Command Configuration
# Validates project type and LSP server availability
name: doctor
description: Diagnostic check for project type and LSP server availability
enabled: true

# Check these project type detections
project_detection:
  enabled: true

# Check these LSP servers based on project type
lsp_checks:
  rust:
    - rust-analyzer
  nodejs:
    - typescript-language-server
  python:
    - pylsp
  go:
    - gopls

# Output format for doctor results
output:
  format: human-readable
  show_installed_paths: true
  show_install_hints: true
