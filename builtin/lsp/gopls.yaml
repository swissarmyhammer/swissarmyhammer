# Go LSP Server Configuration
name: gopls
project_types:
  - go
command: gopls
args: []
language_ids:
  - go
file_extensions:
  - go
initialization_options: null
startup_timeout_secs: 30
health_check_interval_secs: 60
install_hint: "Install gopls: go install github.com/golang/tools/gopls@latest"
icon: ""

# Doctor checks for this LSP
doctor:
  description: "Validates gopls installation and availability"
  check_command: "which gopls"
  check_version_command: "gopls version"
  version_pattern: null
