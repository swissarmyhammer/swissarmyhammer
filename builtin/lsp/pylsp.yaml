# Python LSP Server Configuration
name: pylsp
project_types:
  - python
command: pylsp
args: []
language_ids:
  - python
file_extensions:
  - py
initialization_options: null
startup_timeout_secs: 30
health_check_interval_secs: 60
install_hint: "Install python-lsp-server: pip install python-lsp-server"
icon: ""

# Doctor checks for this LSP
doctor:
  description: "Validates pylsp installation and availability"
  check_command: "which pylsp"
  check_version_command: "pylsp --version"
  version_pattern: null
