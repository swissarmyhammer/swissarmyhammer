# C/C++ LSP Server Configuration
name: clangd
project_types:
  - cmake
  - makefile
command: clangd
args: []
language_ids:
  - c
  - cpp
file_extensions:
  - c
  - cpp
  - cc
  - cxx
  - h
  - hpp
  - hxx
initialization_options: null
startup_timeout_secs: 30
health_check_interval_secs: 60
install_hint: "Install clangd via your package manager"
icon: ""

# Doctor checks for this LSP
doctor:
  description: "Validates clangd installation and availability"
  check_command: "which clangd"
  check_version_command: "clangd --version"
  version_pattern: null
