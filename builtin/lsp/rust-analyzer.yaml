# Rust LSP Server Configuration
name: rust-analyzer
project_types:
  - rust
command: rust-analyzer
args: []
language_ids:
  - rust
file_extensions:
  - rs
initialization_options: null
startup_timeout_secs: 30
health_check_interval_secs: 60
install_hint: "Install rust-analyzer: rustup component add rust-analyzer"
icon: "🦀"

# Doctor checks for this LSP
doctor:
  description: "Validates rust-analyzer installation and availability"
  check_command: "which rust-analyzer"
  check_version_command: "rust-analyzer --version"
  version_pattern: null
