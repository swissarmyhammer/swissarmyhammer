[package]
name = "embedding-benchmark"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false
description = "Benchmarks comparing ANE (CoreML) vs CPU (llama.cpp) embedding backends"

[[bench]]
name = "embed_bench"
harness = false

[[bench]]
name = "nomic_bench"
harness = false

[[bench]]
name = "unixcoder_bench"
harness = false

[dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
llama-embedding = { workspace = true }
model-embedding = { workspace = true }
model-loader = { workspace = true }
tokio = { workspace = true, features = ["full"] }

[target.'cfg(target_os = "macos")'.dependencies]
ane-embedding = { workspace = true }
