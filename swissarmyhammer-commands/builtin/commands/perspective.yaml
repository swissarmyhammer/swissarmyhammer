- id: perspective.load
  name: Load Perspective
  params:
    - name: name
      from: args
  keys: {}

- id: perspective.save
  name: Save Perspective
  undoable: true
  params:
    - name: name
      from: args
  keys: {}

- id: perspective.delete
  name: Delete Perspective
  scope: "entity:perspective"
  undoable: true
  context_menu: true
  params:
    - name: name
      from: args
  keys: {}

- id: perspective.rename
  name: Rename Perspective
  # Hidden from the palette: this command requires `id` + `new_name` args
  # and cannot be invoked directly from the palette (no args prompt UI).
  # The user-facing entry point is `ui.perspective.startRename`, which
  # triggers inline rename mode and then dispatches this command with the
  # collected arguments.
  visible: false
  undoable: true
  params:
    - name: id
      from: args
    - name: new_name
      from: args
  keys: {}

- id: perspective.filter
  name: Set Filter
  # Available from the palette (no scope) and the context menu. The
  # `perspective_id` is resolved at execute time from (in order) args,
  # scope-chain moniker, UIState active perspective, first perspective
  # for the active view kind.
  undoable: true
  context_menu: true
  params:
    - name: filter
      from: args
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.clearFilter
  name: Clear Filter
  undoable: true
  context_menu: true
  params:
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.group
  name: Set Group
  undoable: true
  context_menu: true
  params:
    - name: group
      from: args
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.clearGroup
  name: Clear Group
  undoable: true
  context_menu: true
  params:
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.sort.set
  name: Sort Field
  undoable: true
  context_menu: true
  params:
    - name: field
      from: args
    - name: direction
      from: args
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.sort.clear
  name: Clear Sort
  # Unconditionally clears every sort entry on the resolved perspective.
  # Per-field removal is covered by `perspective.sort.toggle`'s asc → desc →
  # none state cycle; this command is the palette / context-menu entry point
  # for "reset the whole sort list" and never takes a `field` arg.
  undoable: true
  context_menu: true
  params:
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.sort.toggle
  name: Toggle Sort
  undoable: true
  context_menu: true
  params:
    - name: field
      from: args
    - name: perspective_id
      from: args
  keys: {}

- id: perspective.next
  name: Next Perspective
  keys:
    cua: "Mod+]"
    vim: "gt"

- id: perspective.prev
  name: Previous Perspective
  keys:
    cua: "Mod+["
    vim: "gT"

- id: perspective.goto
  name: Go to Perspective
  visible: false
  params:
    - name: id
      from: args
    - name: view_kind
      from: args
  keys: {}

- id: perspective.list
  name: List Perspectives
  visible: false
