- id: task.move
  name: Move Task
  scope: "entity:task"
  undoable: true
  params:
    - name: task
      from: scope_chain
      entity_type: task
    - name: column
      from: target
      entity_type: column
    - name: drop_index
      from: args

- id: task.delete
  name: Delete Task
  scope: "entity:task"
  undoable: true
  context_menu: true
  keys:
    vim: dd
    cua: Mod+Backspace
  params:
    - name: task
      from: scope_chain
      entity_type: task

- id: task.untag
  name: Remove Tag
  scope: "entity:tag,entity:task"
  undoable: true
  context_menu: true
  keys:
    vim: x
    cua: Delete
  params:
    - name: tag
      from: scope_chain
      entity_type: tag
    - name: task
      from: scope_chain
      entity_type: task

- id: task.doThisNext
  name: Do This Next
  scope: "entity:task"
  undoable: true
  context_menu: true
  params:
    - name: task
      from: scope_chain
      entity_type: task

- id: entity.add
  name: New Entity
  undoable: true
  visible: false
  params:
    - name: entity_type
      from: args

- id: entity.update_field
  name: Update Field
  undoable: true
  visible: false
  params:
    - name: entity_type
      from: args
    - name: id
      from: args
    - name: field_name
      from: args
    - name: value
      from: args

- id: entity.delete
  name: Delete
  undoable: true
  visible: false
  params:
    - name: moniker
      from: target

- id: entity.archive
  name: Archive
  scope: "entity:task"
  undoable: true
  context_menu: true
  keys:
    vim: dd
  params:
    - name: moniker
      from: target

- id: entity.unarchive
  name: Unarchive
  scope: "entity:task"
  undoable: true
  context_menu: true
  params:
    - name: moniker
      from: target

- id: tag.update
  name: Update Tag
  scope: "entity:tag"
  undoable: true
  visible: false
  params:
    - name: id
      from: scope_chain
      entity_type: tag

- id: column.reorder
  name: Reorder Columns
  undoable: true
  visible: false
  params:
    - name: id
      from: args
    - name: target_index
      from: args

- id: entity.cut
  name: "Cut {{entity.type}}"
  scope: "entity:task"
  undoable: true
  context_menu: true
  keys:
    cua: Mod+X
    vim: x
  menu:
    path: [Edit]
    group: 1
    order: 0
  params:
    - name: task
      from: scope_chain
      entity_type: task

- id: entity.copy
  name: "Copy {{entity.type}}"
  scope: "entity:task"
  undoable: false
  context_menu: true
  keys:
    cua: Mod+C
    vim: "y"
  menu:
    path: [Edit]
    group: 1
    order: 1
  params:
    - name: task
      from: scope_chain
      entity_type: task

- id: entity.paste
  name: "Paste {{entity.type}}"
  undoable: true
  context_menu: true
  keys:
    cua: Mod+V
    vim: p
  menu:
    path: [Edit]
    group: 1
    order: 2
  params:
    - name: column
      from: scope_chain
      entity_type: column

- id: attachment.delete
  name: Delete Attachment
  scope: "entity:task"
  undoable: true
  visible: false
  params:
    - name: task_id
      from: args
    - name: id
      from: args
