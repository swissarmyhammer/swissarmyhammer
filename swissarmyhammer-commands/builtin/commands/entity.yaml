# =============================================================================
# COMMAND ORGANIZATION RULE — read this before adding or moving commands.
# =============================================================================
#
# Command declarations (the full contract: id, name, params, undoable, keys,
# context_menu, scope) live in `swissarmyhammer-commands/builtin/commands/`,
# split by noun:
#
#   * entity.yaml      — cross-cutting commands that apply to any entity by
#                        target moniker. Listed below.
#   * ui.yaml          — UI commands, including the cross-cutting `ui.inspect`.
#   * task.yaml,       — type-specific commands only. A command that operates
#     tag.yaml,          on a single entity type belongs in that type's file,
#     project.yaml,      not here.
#     column.yaml,
#     attachment.yaml,
#     perspective.yaml
#
# A command is "cross-cutting" when its primary param declares `from: target`
# — it operates on whatever entity the context menu fired over, regardless of
# type. The scope_commands emitter auto-emits each cross-cutting command once
# per entity moniker in the scope chain. Per-type opt-out lives in Rust
# `Command::available()` (e.g. attachments reject `entity.archive`); it is
# never declared by re-listing the command in a per-entity schema.
#
# CROSS-CUTTING COMMAND IDS (must NOT appear in
# `swissarmyhammer-kanban/builtin/entities/*.yaml`):
#
#   * ui.inspect          (declared in ui.yaml)
#   * entity.add
#   * entity.delete
#   * entity.archive
#   * entity.unarchive
#   * entity.copy
#   * entity.cut
#   * entity.paste
#   * entity.update_field
#
# Per-entity schemas (`swissarmyhammer-kanban/builtin/entities/*.yaml`) list
# ONLY type-specific command references with overlay metadata
# (`context_menu`, `keys`, `menu_name`). Cross-cutting commands are NOT
# listed there — they auto-emit from this registry.
#
# A YAML hygiene test enforces this rule:
#   `cargo nextest run -p swissarmyhammer-kanban \
#       yaml_hygiene_no_cross_cutting_in_entity_schemas`
# =============================================================================

- id: task.move
  name: Move Task
  scope: "entity:task"
  undoable: true
  params:
    - name: task
      from: scope_chain
      entity_type: task
    - name: column
      from: target
      entity_type: column
    - name: drop_index
      from: args

- id: task.delete
  name: Delete Task
  scope: "entity:task"
  undoable: true
  context_menu: true
  keys:
    vim: dd
    cua: Mod+Backspace
  params:
    - name: task
      from: scope_chain
      entity_type: task

- id: task.untag
  name: Remove Tag
  scope: "entity:tag,entity:task"
  undoable: true
  context_menu: true
  keys:
    vim: x
    cua: Delete
  params:
    - name: tag
      from: scope_chain
      entity_type: tag
    - name: task
      from: scope_chain
      entity_type: task

- id: task.doThisNext
  name: Do This Next
  scope: "entity:task"
  undoable: true
  context_menu: true
  params:
    - name: task
      from: scope_chain
      entity_type: task

- id: entity.add
  name: New Entity
  undoable: true
  visible: false
  params:
    - name: entity_type
      from: args

- id: entity.update_field
  name: Update Field
  undoable: true
  visible: false
  params:
    - name: entity_type
      from: args
    - name: id
      from: args
    - name: field_name
      from: args
    - name: value
      from: args

- id: entity.delete
  name: Delete
  undoable: true
  visible: false
  params:
    - name: moniker
      from: target

- id: entity.archive
  name: Archive
  undoable: true
  context_menu: true
  keys:
    vim: dd
  params:
    - name: moniker
      from: target

- id: entity.unarchive
  name: Unarchive
  undoable: true
  context_menu: true
  params:
    - name: moniker
      from: target

- id: tag.update
  name: Update Tag
  scope: "entity:tag"
  undoable: true
  visible: false
  params:
    - name: id
      from: scope_chain
      entity_type: tag

- id: column.reorder
  name: Reorder Columns
  undoable: true
  visible: false
  params:
    - name: id
      from: args
    - name: target_index
      from: args

- id: entity.cut
  name: "Cut {{entity.type}}"
  undoable: true
  context_menu: true
  keys:
    cua: Mod+X
    vim: x
  menu:
    path: [Edit]
    group: 1
    order: 0
  params:
    - name: task
      from: scope_chain
      entity_type: task

- id: entity.copy
  name: "Copy {{entity.type}}"
  undoable: false
  context_menu: true
  keys:
    cua: Mod+C
    vim: "y"
  menu:
    path: [Edit]
    group: 1
    order: 1
  params:
    - name: task
      from: scope_chain
      entity_type: task

- id: entity.paste
  name: "Paste {{entity.type}}"
  undoable: true
  context_menu: true
  keys:
    cua: Mod+V
    vim: p
  menu:
    path: [Edit]
    group: 1
    order: 2
  params:
    - name: column
      from: scope_chain
      entity_type: column

- id: attachment.delete
  name: Delete Attachment
  scope: "entity:task"
  undoable: true
  visible: false
  params:
    - name: task_id
      from: args
    - name: id
      from: args
