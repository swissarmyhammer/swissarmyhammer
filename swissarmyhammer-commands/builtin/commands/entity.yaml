# =============================================================================
# COMMAND ORGANIZATION RULE — read this before adding or moving commands.
# =============================================================================
#
# Command declarations (the full contract: id, name, params, undoable, keys,
# context_menu, scope) are stacked per-crate at app startup. Generic commands
# live in `swissarmyhammer-commands/builtin/commands/`; domain-specific
# commands live in the owning crate's `builtin/commands/` and are contributed
# via that crate's `builtin_yaml_sources()`.
#
# Generic commands live alongside this file, in
# `swissarmyhammer-commands/builtin/commands/`:
#
#   * commands:app.yaml         — app-level commands (quit, undo, redo,
#                                 palette, ...).
#   * commands:settings.yaml    — keymap toggles.
#   * commands:entity.yaml      — cross-cutting commands that apply to any
#                                 entity by target moniker. Listed below.
#   * commands:ui.yaml          — UI commands, including the cross-cutting
#                                 `ui.inspect`.
#   * commands:drag.yaml        — generic drag-and-drop mechanics.
#
# Kanban-specific commands live in a DIFFERENT crate, in
# `swissarmyhammer-kanban/builtin/commands/` (not siblings of this file!):
#
#   * kanban:task.yaml          — type-specific commands only. A command that
#     kanban:tag.yaml             operates on a single entity type belongs in
#     kanban:column.yaml          that type's file, not here.
#     kanban:attachment.yaml
#     kanban:perspective.yaml
#   * kanban:file.yaml          — kanban file/board lifecycle (switchBoard,
#                                 newBoard, closeBoard, openBoard).
#
# A command is "cross-cutting" when its primary param declares `from: target`
# — it operates on whatever entity the context menu fired over, regardless of
# type. The scope_commands emitter auto-emits each cross-cutting command once
# per entity moniker in the scope chain. Per-type opt-out lives in Rust
# `Command::available()` (e.g. attachments reject `entity.archive`); it is
# never declared by re-listing the command in a per-entity schema.
#
# CROSS-CUTTING COMMAND IDS (must NOT appear in
# `swissarmyhammer-kanban/builtin/entities/*.yaml`):
#
#   * ui.inspect          (declared in ui.yaml)
#   * entity.add
#   * entity.delete
#   * entity.archive
#   * entity.unarchive
#   * entity.copy
#   * entity.cut
#   * entity.paste
#   * entity.update_field
#
# Per-entity schemas (`swissarmyhammer-kanban/builtin/entities/*.yaml`) list
# ONLY type-specific command references with overlay metadata
# (`context_menu`, `keys`, `menu_name`). Cross-cutting commands are NOT
# listed there — they auto-emit from this registry.
#
# A YAML hygiene test enforces this rule:
#   `cargo nextest run -p swissarmyhammer-kanban \
#       yaml_hygiene_no_cross_cutting_in_entity_schemas`
# =============================================================================

- id: entity.add
  name: New Entity
  undoable: true
  visible: false
  params:
    - name: entity_type
      from: args

- id: entity.update_field
  name: Update Field
  undoable: true
  visible: false
  params:
    - name: entity_type
      from: args
    - name: id
      from: args
    - name: field_name
      from: args
    - name: value
      from: args

- id: entity.delete
  name: "Delete {{entity.type}}"
  undoable: true
  context_menu: true
  context_menu_group: 2
  context_menu_order: 0
  keys:
    cua: Mod+Backspace
  params:
    - name: moniker
      from: target

- id: entity.archive
  name: "Archive {{entity.type}}"
  undoable: true
  context_menu: true
  context_menu_group: 2
  context_menu_order: 1
  keys:
    vim: dd
  params:
    - name: moniker
      from: target

- id: entity.unarchive
  name: "Unarchive {{entity.type}}"
  undoable: true
  context_menu: true
  context_menu_group: 2
  context_menu_order: 2
  params:
    - name: moniker
      from: target

- id: entity.cut
  name: "Cut {{entity.type}}"
  undoable: true
  context_menu: true
  context_menu_group: 1
  context_menu_order: 0
  keys:
    cua: Mod+X
    vim: x
  menu:
    path: [Edit]
    group: 1
    order: 0
  params:
    - name: moniker
      from: target

- id: entity.copy
  name: "Copy {{entity.type}}"
  undoable: false
  context_menu: true
  context_menu_group: 1
  context_menu_order: 1
  keys:
    cua: Mod+C
    vim: "y"
  menu:
    path: [Edit]
    group: 1
    order: 1
  params:
    - name: moniker
      from: target

- id: entity.paste
  name: "Paste {{entity.type}}"
  undoable: true
  context_menu: true
  context_menu_group: 1
  context_menu_order: 2
  keys:
    cua: Mod+V
    vim: p
  menu:
    path: [Edit]
    group: 1
    order: 2
  params:
    - name: moniker
      from: target

