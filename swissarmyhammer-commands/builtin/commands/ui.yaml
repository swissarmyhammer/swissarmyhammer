- id: ui.inspect
  name: "Inspect {{entity.type}}"
  context_menu: true
  context_menu_group: 3
  context_menu_order: 0
  params:
    - name: moniker
      from: target

- id: ui.inspector.close
  name: Close Inspector
  keys:
    cua: Escape
    vim: q

- id: ui.inspector.close_all
  name: Close All Inspectors
  keys:
    cua: Mod+Escape
    vim: Q

- id: ui.palette.open
  name: Command Palette
  keys:
    cua: Mod+K
    vim: ":"

- id: ui.palette.close
  name: Close Palette
  visible: false

- id: ui.entity.startRename
  name: Rename Perspective
  # Scope-pinned to perspective entities — the only renameable entity today
  # is a perspective tab. The `entity:perspective` filter keeps the keyboard
  # binding from claiming Enter on board / column / card focus, where the
  # global `nav.drillIn` should still fire.
  scope: "entity:perspective"
  keys:
    cua: Enter
    vim: Enter
    emacs: Enter

- id: ui.mode.set
  name: Set App Mode
  visible: false
  undoable: false
  params:
    - name: mode
      from: args

- id: ui.setFocus
  name: Set Focus
  visible: false
  undoable: false

- id: window.new
  name: New Window
  keys:
    cua: Mod+Shift+N
    vim: Mod+Shift+N
    emacs: Mod+Shift+N
  menu:
    path: [Window]
    group: 0
    order: 0
