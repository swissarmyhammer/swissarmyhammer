- id: ui.inspect
  name: Inspect
  visible: false
  params:
    - name: moniker
      from: args

- id: ui.inspector.close
  name: Close Inspector
  keys:
    cua: Escape
    vim: q

- id: ui.inspector.close_all
  name: Close All Inspectors
  keys:
    cua: Mod+Escape
    vim: Q

- id: ui.palette.open
  name: Command Palette
  keys:
    cua: Mod+K
    vim: ":"

- id: ui.palette.close
  name: Close Palette
  visible: false

- id: ui.view.set
  name: Switch View
  params:
    - name: view_id
      from: args

- id: ui.perspective.set
  name: Switch Perspective
  visible: false
  params:
    - name: perspective_id
      from: args

- id: ui.perspective.startRename
  name: Rename Perspective

- id: ui.mode.set
  name: Set App Mode
  visible: false
  undoable: false
  params:
    - name: mode
      from: args

- id: ui.setFocus
  name: Set Focus
  visible: false
  undoable: false

- id: window.new
  name: New Window
  keys:
    cua: Mod+Shift+N
    vim: Mod+Shift+N
    emacs: Mod+Shift+N
  menu:
    path: [Window]
    group: 0
    order: 0
