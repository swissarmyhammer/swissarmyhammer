# NEVER add features or feature flags to this Cargo.toml!
# SwissArmyHammer provides ALL functionality ALL the time.
# This is a SwissArmyHammer - every tool, every time!

[package]
name = "swissarmyhammer-tools"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "MCP tools and server implementation for SwissArmyHammer"
keywords = ["mcp", "tools", "ai", "assistant", "protocol"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
# Core library dependency removed - now uses domain crates only

swissarmyhammer-common = { workspace = true }
swissarmyhammer-directory = { workspace = true }
swissarmyhammer-prompts = { workspace = true }
swissarmyhammer-config = { workspace = true }
swissarmyhammer-git = { workspace = true }
swissarmyhammer-kanban = { workspace = true }
swissarmyhammer-skills = { workspace = true }
swissarmyhammer-templating = { workspace = true }
swissarmyhammer-agents = { workspace = true }
swissarmyhammer-shell = { workspace = true }
mirdan = { workspace = true }
tempfile = { workspace = true }
swissarmyhammer-web = { workspace = true }
swissarmyhammer-code-context = { workspace = true }
swissarmyhammer-treesitter = { workspace = true }
swissarmyhammer-project-detection = { workspace = true }
# ACP agents (direct usage, no executor wrapper)
claude-agent = { workspace = true }
llama-agent = { workspace = true }

swissarmyhammer-mcp-proxy = { workspace = true }


# Async and JSON processing
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml_ng = { workspace = true }
anyhow = { workspace = true }

once_cell = { workspace = true }
base64 = { workspace = true }

# MCP protocol
rmcp = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
test-log = { workspace = true }

# ULID for unique identifiers
ulid = { workspace = true }

# Async traits
async-trait = { workspace = true }

# Additional dependencies needed by MCP tools
chrono = { workspace = true }
dirs = { workspace = true }
regex = { workspace = true }
schemars = { workspace = true }
thiserror = { workspace = true }

# File tools dependencies
glob = { workspace = true }
walkdir = { workspace = true }
ignore = { workspace = true }
grep = { workspace = true }

# File watching
notify = { workspace = true }
async-watcher = { workspace = true }

# File editing enhanced dependencies
encoding_rs = { workspace = true }
filetime = { workspace = true }

# Web dependencies
libc = { workspace = true }
rand = { workspace = true }
futures-util = { workspace = true }
reqwest = { workspace = true }

# Embedding model for semantic search (platform-aware: ANE on Apple Silicon, llama.cpp elsewhere)
swissarmyhammer-embedding = { workspace = true }
model-embedding = { workspace = true }

# SQLite for embedding storage
rusqlite = { workspace = true }

# Hashing and tree-sitter for incremental indexing
md5 = { workspace = true }
tree-sitter = { workspace = true }

# LSP server lifecycle management
swissarmyhammer-lsp = { workspace = true }

# Operations pattern
swissarmyhammer-operations = { workspace = true }

# Semantic diffing
swissarmyhammer-sem = { workspace = true }

# HTTP server dependencies
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true, features = ["trace"] }
hyper = { workspace = true }
byte-unit = { workspace = true }
owo-colors = { workspace = true }
agent-client-protocol = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
swissarmyhammer-web = { workspace = true }
swissarmyhammer-config = { workspace = true }
tempfile = { workspace = true }
futures-util = { workspace = true }
tracing-subscriber = { workspace = true }
proptest = { workspace = true }
serial_test = { workspace = true }
git2 = { workspace = true }
rmcp = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
wiremock = { workspace = true }
