[package]
name = "swissarmyhammer-embedding"
version.workspace = true
edition = "2021"

[dependencies]
# Embedding backends
llama-embedding = { workspace = true }
model-embedding = { workspace = true }
model-loader = { workspace = true }

# Config: model resolution + platform selection
swissarmyhammer-config = { workspace = true }

# Fundamentals
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
ane-embedding = { workspace = true }

[features]
# Enables the integration tests in `tests/integration_test.rs`. They resolve
# real embedding model files from HuggingFace (cached on disk after the first
# run), so they are not part of the default `cargo test` run. Run with:
#   cargo nextest run --features embedding-models --profile embedding-models
embedding-models = []

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
