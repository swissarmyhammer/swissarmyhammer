[package]
name = "swissarmyhammer-embedding"
version.workspace = true
edition = "2021"

[dependencies]
# Embedding backends
llama-embedding = { workspace = true }
model-embedding = { path = "../model-embedding" }

[target.'cfg(target_os = "macos")'.dependencies]
ane-embedding = { path = "../ane-embedding" }
model-loader = { workspace = true }

# Config: model resolution + platform selection
swissarmyhammer-config = { path = "../swissarmyhammer-config" }

# Fundamentals
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
