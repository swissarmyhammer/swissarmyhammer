[profile.default]
fail-fast = false
# Warn every 5s, hard-kill after 60 periods (5 minutes)
slow-timeout = { period = "5s", terminate-after = 60 }
# Note: swissarmyhammer-embedding integration tests are gated behind the
# `embedding-models` cargo feature (not compiled in by default). Run with:
#   cargo nextest run --features embedding-models --profile embedding-models

# Limit concurrency for heavy LLM-based tests
# Use test-threads to limit overall parallelism, or use test-groups for finer control

# Define a test group for resource-intensive tests
[test-groups.acp-conformance]
# loads models, so we can't go nuts on concurrency
max-threads = 4

# llama-embedding uses a global backend that only allows one initialization per process
# Tests must run serially to avoid "BackendAlreadyInitialized" errors
[test-groups.llama-embedding-serial]
max-threads = 1

# The swissarmyhammer-entity watcher tests that start a real `EntityWatcher`
# hold a live macOS FSEvents stream. FSEvents event *delivery* and stream
# *teardown* both serialize through the single OS FSEvents subsystem, which is
# shared across every process in the run. Under full --workspace parallelism
# (~16 cores busy compiling + running 14.9k tests) that subsystem is starved:
# the create/remove tests miss their 10s event deadline and the drop test's
# teardown crosses its promptness budget — intermittently, a different one each
# run, while all pass in isolation. Capping concurrency for just these tests
# keeps the real watcher under test without contending for FSEvents.
#
# This MUST be a nextest test-group, not `#[serial]`: the contention is at the
# OS subsystem level across the whole run (all processes), whereas `#[serial]`
# only coordinates within a single process.
[test-groups.fsevents-watcher]
max-threads = 1

# Apply the group to acp-conformance package tests
[[profile.default.overrides]]
filter = "package(acp-conformance)"
test-group = "acp-conformance"
# Slower tests: warn every 60s, kill after 5 periods (5 minutes)
slow-timeout = { period = "60s", terminate-after = 5 }

# swissarmyhammer-treesitter tests default to embedding_enabled=true so almost
# every test loads the qwen-embedding model. Nextest runs each test in its own
# process, so there is no in-process cache — N parallel tests means N cold
# model loads, which contend catastrophically (observed: ~200s per test).
# Serialising them keeps the real embedding pipeline exercised at ~1s per test.
[test-groups.treesitter-embedding]
max-threads = 1

[[profile.default.overrides]]
filter = "package(swissarmyhammer-treesitter)"
test-group = "treesitter-embedding"
# Warn every 60s, kill after 6 periods (6 minutes)
slow-timeout = { period = "60s", terminate-after = 6 }

# Same root cause as treesitter-embedding above, applied to the
# swissarmyhammer-tools code_context unit tests: they call
# `create_indexed_project` which invokes the real `index_discovered_files_async`
# indexer, which loads the qwen-embedding model. With nextest's
# process-per-test isolation there is no in-process cache, so running these in
# parallel triggers N cold model loads and the slow-timeout kills 11 of them at
# 300s. Serialising this subset keeps the real pipeline under test while making
# each run measure in seconds, not minutes.
[[profile.default.overrides]]
filter = "package(swissarmyhammer-tools) and test(/^mcp::tools::code_context::tests::/)"
test-group = "treesitter-embedding"
slow-timeout = { period = "60s", terminate-after = 6 }

# Same root cause again, but for the code_context END-TO-END tests, which live
# in *separate test binaries* (not the in-crate unit module matched above):
#   - the `code_context_mcp_e2e_test` binary (rebuild/detect tests), and
#   - the `tools_tests` `qwen_embedding_*` / `semantic_search` integration tests.
# Each calls the real indexer (qwen-embedding model load) plus LSP indexing and
# file-watching. Run in parallel, N cold model loads contend and the rebuild/
# detect/qwen tests hang until the slow-timeout kills them at 300s; they all
# pass under `--test-threads=1`. Serialise them into the shared embedding group.
# This MUST be a nextest test-group, not `#[serial]`: the tests span two test
# binaries (= two processes), and `#[serial]` only coordinates within a single
# process, whereas a test-group caps concurrency across the whole run.
[[profile.default.overrides]]
filter = "package(swissarmyhammer-tools) and (binary(code_context_mcp_e2e_test) or test(/qwen_embedding/) or test(/semantic_search/))"
test-group = "treesitter-embedding"
slow-timeout = { period = "60s", terminate-after = 6 }

# The swissarmyhammer-diagnostics IPC/integration test binaries each spawn a REAL
# `rust-analyzer` (via `LspDaemon`) and drive real `textDocument/rename`,
# `textDocument/definition`, and `textDocument/diagnostic` requests through the
# real leader/follower socket. Each such request is bounded by the client's LSP
# request timeout. Under full --workspace parallelism (~16 cores busy compiling +
# running the whole suite) a cold rust-analyzer is CPU-starved and the timed
# request misses its budget — the `leader_follower_request_ipc` rename/definition
# tests time out and fail, intermittently and load-dependently, while all pass in
# isolation. This is the SAME class solved above for fsevents-watcher and
# treesitter-embedding: cap concurrency so at most ONE real rust-analyzer drives
# these tests at a time, which keeps the real leader/follower routing and real
# edits under test without contending for CPU. (Local runs also inherit a
# load-tolerant `SAH_LSP_REQUEST_TIMEOUT_SECS` from `.cargo/config.toml [env]`.)
#
# This MUST be a nextest test-group, not `#[serial]`: the contention spans four
# separate test binaries (= four processes), and `#[serial]` only coordinates
# within a single process, whereas a test-group caps concurrency across the whole
# run.
[test-groups.lsp-ipc-serial]
max-threads = 1

[[profile.default.overrides]]
filter = "package(swissarmyhammer-diagnostics) and (binary(leader_follower_request_ipc) or binary(ra_pull_readiness) or binary(leader_watcher) or binary(diagnose_rust_analyzer))"
test-group = "lsp-ipc-serial"
# Real rust-analyzer round-trips are not sub-second: warn every 60s, hard-kill
# after 5 periods (5 minutes) so a cold analyzer has room to answer.
slow-timeout = { period = "60s", terminate-after = 5 }

# The kanban-app AI-panel E2E tests each spin up an in-process llama-agent and
# load the qwen-0.6B model, then run several real agentic generation rounds.
# These run on the GPU in CI (the Test job no longer forces CPU), where the Metal
# GPU's COMPUTE is time-sliced across processes. They were previously a separate
# max-threads=1 group so they wouldn't wait behind the whole llama-agent suite —
# fine on CPU, but on the GPU it let an e2e turn run concurrently with a
# llama-agent real-model test, and the heaviest op (`session/prompt`) blew its
# hang budget under that contention. Put them in the SAME global serial lane as
# the llama-agent / llama-embedding real-model tests so at most one real-model
# test drives the GPU at a time.
[[profile.default.overrides]]
filter = "package(kanban-app) and binary(ai_panel_e2e)"
test-group = "llama-embedding-serial"
# Bounded retry for a genuinely NONDETERMINISTIC real-model test, not to mask a
# code bug: it drives the qwen-0.6B chat model (documented ~35% per-attempt
# variance — spurious tool calls, KV-cache exhaustion, runaway-guard aborts) on a
# GPU time-sliced against the other model tests. Under CI contention a turn can
# slow past the test's own hang guard and Elapsed-timeout even though the model
# is answering; re-running lands green when contention momentarily eases. Scoped
# to this real-model binary only — deterministic tests never retry. Only the
# failing test re-runs, so the happy path is not slowed.
retries = 2
# These run several real agentic generation rounds and retry the prompt pair on
# transient 0.6B variance (KV-cache exhaustion / runaway-guard aborts) up to 6
# attempts. Uncontended a clean pair lands in ~26s (measured locally), but the
# GPU is still time-sliced against the separate embedding test-groups: under that
# contention turns slow down AND hit more transient variance, so the retry path
# can run many generations and grind past a 6-minute budget without landing a
# clean pair (observed TIMEOUT at 360s). Warn every 60s, hard-kill after 10
# periods (10 minutes) so the bounded retry loop has room to converge under
# contention rather than being killed mid-retry.
slow-timeout = { period = "60s", terminate-after = 10 }

# The swissarmyhammer-agent real-model review e2e drives the production review
# pipeline over a real local model (qwen-0.6B chat) AND loads the real platform
# embedder (qwen-embedding). It is scoped to a single `function-length` validator
# over one root-level `.rs` file to stay minimal, but it is NOT sub-minute: a cold
# qwen-0.6B + qwen-embedding GPU load plus the fan-out generation runs ~3 minutes
# uncontended (measured ~175s locally), and the nondeterministic 0.6B model can
# flag the tiny diff — producing a candidate that triggers a real VERIFY generation
# on top of the fan-out, so "zero verify calls" cannot be guaranteed. Put it in the
# SAME global serial lane as the llama-agent / llama-embedding / kanban-app
# real-model tests so at most one of THESE drives the GPU at a time. The GPU is
# still time-sliced against the separate embedding test-groups, so on CI the run
# lands well over the uncontended ~175s. Scoped to the binary so the fast,
# model-free `review_factory` wiring test stays parallel. Warn every 60s, hard-kill
# after 8 periods (8 minutes) — generous headroom over the measured uncontended
# runtime plus cross-group GPU contention and a possible verify pass, matching the
# budgets the other heavy real-model tests carry.
[[profile.default.overrides]]
filter = "package(swissarmyhammer-agent) and binary(review_real_model_e2e)"
test-group = "llama-embedding-serial"
slow-timeout = { period = "60s", terminate-after = 8 }
# Bounded retry for the same reason as the kanban ai_panel_e2e override above: a
# nondeterministic qwen-0.6B real-model test whose turn can slow past its hang
# budget under CI GPU contention. Re-run converts that transient to green; it
# does not mask a code defect (deterministic tests never retry).
retries = 2

# Apply serial execution to llama-embedding tests
[[profile.default.overrides]]
filter = "package(llama-embedding)"
test-group = "llama-embedding-serial"
# Warn every 30s, kill after 10 periods (5 minutes)
slow-timeout = { period = "30s", terminate-after = 10 }

# llama-agent shares the same global-backend constraint as llama-embedding:
# only one ModelManager::new can initialize the llama.cpp backend per process.
# Running these tests serially prevents "Backend already initialized" races and
# lets each test assert real behavior instead of returning early on a race.
[[profile.default.overrides]]
filter = "package(llama-agent)"
test-group = "llama-embedding-serial"
slow-timeout = { period = "30s", terminate-after = 10 }
# Bounded retry for the same reason as the kanban / swissarmyhammer-agent
# real-model overrides above: llama-agent's real-model integration tests
# (e.g. acp_hooks_real_model) drive the nondeterministic qwen-0.6B chat model
# through the live ACP loop; under CI GPU contention a tool-calling turn can slow
# past the test's own hang guard (`must not hang: Elapsed`) even while the model
# answers. Re-run lands green when contention eases; it does not mask a defect.
retries = 2

# Serialise the swissarmyhammer-entity tests that start a live FSEvents watcher
# (see the `fsevents-watcher` group above for the why). Only these four tests
# open a real `EntityWatcher`; the rest of the watcher module exercises the
# `parse_*`/`handle_*` helpers directly with no OS watcher and stays parallel.
[[profile.default.overrides]]
filter = "package(swissarmyhammer-entity) and (test(test_attachment_create_emits_event) or test(test_attachment_remove_emits_event) or test(entity_watcher_drop_returns_promptly) or test(entity_watcher_drop_sends_shutdown))"
test-group = "fsevents-watcher"

# Profile for running embedding integration tests (requires HF models on disk).
# Usage: cargo nextest run --profile embedding-models
[profile.embedding-models]
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 5 }

[[profile.embedding-models.overrides]]
filter = "package(swissarmyhammer-embedding)"
test-group = "llama-embedding-serial"
slow-timeout = { period = "120s", terminate-after = 3 }
